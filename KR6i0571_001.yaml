body:
  text: 罽賓國沙門佛陀多羅譯陸通律寺勤息寂正要解上五字所詮謂圓覺是法大方廣是義故文中標結指陳只言圓覺下六字屬能詮修多羅了義是歎教勝能良以宗本體用是法義之宏綱詮旨功能了言象之皎鏡事周義盡須建五名簡要標題且存兩號大方廣是體相用各有二異大者當體得名常徧為義常則竪通三世徧則橫該十方謂圓覺體無有邊涯絕諸分量強名大也意言此覺有廣大義有方圓義謂體大而用廣理方而用圓方是正直不偏圓乃無虧無缺亦可大方是體廣圓為用謂體大而正直不偏用廣而圓滿無缺上三字是別圓字是總明此圓覺即是總別之德具彰法義之門故名大方廣圓覺後能詮修多羅三字總指諸經了義二字歎此一經是決擇究竟顯了之義無過上也故名修多羅了義經罽賓梵語亦云羯濕彌羅北印度邊鄙之名此翻賤種本賤役人自立君長故也沙門梵語此翻勤息勤者勤修戒定慧息者息滅貪嗔痴佛陀多羅梵語唐言覺救以長壽二年龍集癸巳持梵本經至神都東京白馬寺譯成兩卷其度語筆授證義潤文諸德廣評大義別錄總成一卷同緣實相約行收機大分三段共十二章初二章明圓頓行中四章明漸次行後六章明不定行也譯之言易也通也梵為華耳周制達四方東方曰寄西方曰狄鞮南方曰象北方曰譯今翻西語曰譯由漢世多事也經文大分三段始如是我聞至平等法會為序分於是文殊師利下至圓覺章為正宗分於是賢善首下訖經為流通分初序分者若例諸經必具通別二序今但通序雖無發起可用入定集眾兼之以眾集不徒然必有異聞故疏云序中證信便是發起謂佛入大光明藏正受時上與一切諸佛下及菩薩眾生同住清淨覺地現諸淨土皆入三昧同一佛境以表因果無異凡聖同源發此經旨趣如是耶初序分為四初指信聞法如是我聞如是指法之辭也前此無說而言如是者逆指向下所說之法言也我者結集者自稱也聖人已知無我而為傳法利生故隨世假稱耳恐疑者曰此所說法為有所聞而說耶為自撰其說耶故結集者曰如是之法我從佛聞非自撰也既從佛聞則羣疑自銷諍端亦息矣二時化主所在一時婆伽婆疑者曰既從佛聞佛昔說法必有方所何處聞耶故此示之一時者機孰應會之時也婆伽婆主也如來之異號也故涅槃云能破煩惱名婆伽婆三平等法會處入於神通大光明藏三昧正受一切如來光嚴住持是諸眾生清淨覺地身心寂滅平等本際圓滿十方不二隨順於不二境現諸淨土藏即寶性法界藏起信心真如是諸佛眾生之本源神通光明之性體塵沙德用並蘊其中百千通光皆從斯起故曰藏也亦名法性土亦名常寂光智與理冥名為入矣是以安住藏中不受諸受名為正受此經說處即事而真匪離娑婆別論常寂為表正宗所談覺性平等凡聖同源橫亘竪窮不思議一然理不自顯從理垂教教主身土全境即心全心即境故曰於不二境現諸淨土所現淨土即說法處之通序也四同聞眾與大菩薩摩訶薩十萬人俱其名曰文殊師利菩薩普賢菩薩普眼菩薩金剛藏菩薩彌勒菩薩清淨慧菩薩威德自在菩薩辯音菩薩淨諸業障菩薩普覺菩薩圓覺菩薩賢善首菩薩等而為上首與諸眷屬皆入三昧同住如來平等法會初標數列名二與諸下同佛入定菩薩等者梵云菩提薩埵云菩提翻覺薩埵翻有情摩訶大也此有情信大法解大義發大心趣大果修大行證大道故也文殊師利此云玅首亦云玅吉祥表信解之智故亦云玅德表證智故文中本起因地究竟真妄以成正解成就信根故普賢略有三釋一約自體體性周徧曰普隨緣成德曰賢二約諸位曲濟無遺曰普隣極亞聖曰賢三約當位德無不周曰普調柔善順曰賢依此圓覺玅心徵幻法而明正行故普眼由此法門觀身心無體根塵識境世出世間自他二身一切清淨周徧法界故金剛藏從喻得名金剛堅而復利堅則無物可壞利則能壞一切所以諸魔不能侵煩惱不能動又能破諸障斷人疑惑即具無盡藏功德也彌勒此云慈氏慈有三種生緣法緣無緣以對三觀又從姓慈名阿逸多此是無勝三觀能淨三惑名清淨慧以三觀能摧伏三障四魔名威德自在由三觀獲三陀羅尼四無礙辯名辯音三觀對治三道名淨諸業障三觀徧觀諸法同歸實際名普覺圓覺之名有二意一前雖病盡仍恐下根難入又問三期道場加行上中下三根普入圓覺二最初標指從本起至末顯義已周還歸圓覺賢善首者賢則亞聖善則順理首是頭首欲使萬善齊興俱順真理教法流通是賢善首也等有二義一所例二所餘上首為十萬標領同住平等法會孰為其主孰為其伴孰為問者孰為答者無非遊戲大圓覺海也今會諸師廣評三種俱是大乘同緣實相約行收機以漸不定大分三段初二章明圓頓行證次四章明漸次行證後五章明不定行證賢善首章乃流通分初又二初文殊章正明圓頓行證二初請問三初進問威儀於是文殊師利菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言於是二字者躡前之語顯通序兼別求之故下諸章之初皆云於是也即從座起等者從法空之體起悲濟之用以己最勝之頂禮佛最卑之足敬之至也右繞者隨順之義表順覺性三匝敬佛一體三寶也長跪者安危不易叉手者信解合體心境交參權實合也正述請問三初問如來因行二問菩薩發心三問末世離見初問如來因行大悲世尊願為此會諸來法眾說於如來本起清淨因地法行果具萬德偏舉大悲諮詢法要本為法眾故具足十號稱世間尊求證圓覺故名法眾佛昔初發菩提之心圓照本源染體悉淨依此造入無上覺城故云本起清淨因地法行也二問菩薩發心及說菩薩於大乘中發清淨心遠離諸病大乘之體即是本覺於覺悟中發菩提心正念真如故云於圓覺中無取覺者除彼我人一切諸相若有我人等相即非菩薩三世諸佛皆從本覺因地法行遠離諸病病由何生瞥爾取證病體隨生都不發心豈離諸病一發心後永不退轉不退轉故諸魔不嬈夫大教發心當信一切法唯心體具全心發生心佛眾生三無差別是則世事紛紜即大圓覺也三問末世離見能使未來末世眾生求大乘者不墮邪見佛滅度後正法千年像法千年末法萬年即為末世去聖遙遠深可懸憂故顯益中偏垂結指夫求道者必正其因因若非真果終不克故若欲斷無明成佛果誰不由期正道乎故使末世不墮邪見也三三展虔誠作是語已五體投地如是三請終而復始正語而禮威儀也五體四肢及首若惟一度未展䖍誠若過於三禮煩則亂故三周終始顯示真心佛雖以知垂範應爾二佛答三初讚許爾時世尊告文殊師利菩薩言善哉善哉善男子汝等乃能為諸菩薩諮詢如來因地法行及為末世一切眾生求大乘者得正住持不墮邪見汝今諦聽當為汝說先讚後許再言善哉者善之至也善男子者順理曰善男子剛斷汝等者雖一人之言言眾人之意得正住持者安心覺海任持萬行誡令審諦勿雜於緣二受旨時文殊師利菩薩奉教歡喜及諸大眾默然而聽既蒙許說願樂欲聞潔己虗心收視反聽而寂然也讚許佇聽之文下十一段皆同此釋三正答二初長行二初廣答初問二初總示二別釋總示中三義初標示二初依體立教善男子無上法王有大陀羅尼門名為圓覺流出一切清淨真如菩提涅槃及波羅蜜教授菩薩如來於法自在更無有上陀羅尼翻總持謂圓覺體中有塵沙德用從本以來持之不失故大即當體無邊門者出入義也非別有法從中流出於外但依圓覺玅性能通顯示諸功德門無有窮盡名為流出一切清淨真如涅槃及波羅蜜依之六度萬行能生物解名為教授菩薩也二照性斷惑一切如來本起因地皆依圓照清淨覺相永斷無明方成佛道覺相性也圓照修也全性發修以修契性性非染污故云清淨無明體空畢竟寂滅故云永斷無明成道者覺智徧滿一成一切成一佛既爾十方諸佛咸皆然也二別釋三初委明惑相體虗二初明惑相三初徵云何無明不了一法界故名曰無明有通別枝本正使習氣今約圓照正斷根本別惑通別及二習無不該攝也二釋二初標定善男子一切眾生從無始來種種顛倒猶如迷人四方易處法界眾生未能契性盡屬一切起無初相故名無始以悟為迷故名顛倒情竇一鑿狂瀾肆流錯亂多途計執非一故云種種今且按定其非但云顛倒未顯其相倒有所執顛則荒狂如人乍至川原或入聚落忽然心惑以東為西既一方迷餘方俱轉忽然醒悟還是舊方返推此迷了無始跡無本來處無今去處故云易處也二釋相二初法喻示相妄認四大為自身相六塵緣影為自心相譬彼病目見空中華及第二月四大和合假名為身緣慮之心因塵故有如影逐形故云緣影眾生不知圓覺妙心亘徹三際周徧剎塵妄執身心起諸結惑如棄大海認一浮漚前喻迷方今譬華月翳目所喻即上顛倒顛倒故執由翳見華文意法理莫不如然二即喻顯迷善男子空實無華病者妄執由妄執故非唯惑此虗空自性亦復迷彼實華生處由此妄有輪轉生死故名無明月喻例華亦應云月實無二揑者妄執經文影略故不具之既執華從空生不知從翳而起翳則實是華生之處非真實華但恠空裏有華不覺眼中有翳外嫌身心苦惱不知內蓄迷情故名無明二顯體虗三初標體虗善男子此無明者非實有體善惡之性本體元虗二約喻顯如夢中人夢時非無及至於醒了無所得如眾空華滅於虗空不可說言有定滅處何以故無生處故先約夢事喻無明本空次提空華顯夢無生滅故不可說言有定滅處前據能見翳目稱實華生處今約所對虗空生滅叵得矣何以故無生虗故三結流轉一切眾生於無生中妄見生滅是故說名輪轉生死雖曰無生由妄見故說名輪轉二釋圓照覺智三初達妄本空善男子如來因地修圓覺者知是空華即無輪轉亦無身心受彼生死非作故無本性無故修圓覺者牒前如來本起因地皆依圓照清淨覺相即無輪轉無生死法也亦無身心無生死人也既知空華豈有輪轉還丹一粒點鐵成金真理一言超凡成聖外遺世界內脫身心不計身身同虗空不計心心同法界非作故無本性無故也二結成玅觀彼知覺者猶如虗空知虗空者即空華相亦不可說無知覺性有無俱遣是則名為淨覺隨順知覺空者泯彼能觀知能觀空亦空華相如火之木然諸薪已亦復自然此空觀也亦不可說無知覺性假觀也有無俱遣中觀也言雖前後用在一心言慮頓忘故云淨覺覺智契理故云隨順也三徵顯所依覺體何以故虗空性故常不動故如來藏中無起滅故無知見故如法界性究竟圓滿徧十方故前明玅觀必全境發境若不顯觀故無所依是以徵顯令諦觀一又觀是圓照境即覺相觀若非覺照不名圓境若不圓此相非覺虗空性故常不動故真諦也真性如空本來不動如來藏中等俗諦也體具諸法清淨本然生滅既忘知見寧及如法界性等中道也究徹三際圓徧十方絕待難思互融互攝是三即一舉一即三魔佛同途依正何別前云有無俱遣中觀雙遮此曰究竟圓滿中諦雙照觀諦互顯徧十方故二結酬三意是則名為因地法行菩薩因此於大乘中發清淨心末世眾生依此修行不墮邪見上問有三廣答因行而牒酬之無餘蘊矣二重頌非孤起偈也或為鈍根重說或為未來或為增明前說凡言長行偈頌相望例有五對謂有無廣略離合先後隱顯今經問目皆長有偈無答皆長廣偈略餘隨相當對文當指初標舉爾時世尊欲重宣此義而說偈言二正頌二初頌廣答三初頌圓照覺智文殊汝當知一切諸如來從於本因地皆以智慧覺二頌惑相體虗了達於無明知彼是空華即能免流轉又如夢中人醒時不可得長行先釋無明偈中先頌覺智以智照惑故言了達三頌所依覺體覺者如虗空平等不動轉覺徧十方界即得成佛道眾幻滅無處成佛亦無得本性圓滿故即得下二句長先偈後成道亦無得長先偈又如夢中下四句頌空也覺徧下二句頌假也一佛成道法界無非此佛之依正故云徧十方眾幻下三句頌中也具乎遮照眾幻滅無處遮空也成道亦無得遮假也本性圓滿故雙照二邊無所缺減也問下威德自在章方立三觀如何此中便具出之答名出下文義貫初後二頌結酬菩薩於此中能發菩提心末世諸眾生修此免邪見二普賢章決疑的示頓相圓頓法行已示宏綱次在斯章決疑令喜分二初請問三初進問威儀於是普賢菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正述請問三初總問起大悲世尊願為此會諸菩薩眾及為末世一切眾生修大乘者聞此圓覺清淨境界云何修行前明圓照覺相永斷無明諦觀體如修證義足今復問云何修行者但決餘疑複疎初義耳二別徵三難初難以幻還修於幻世尊若彼眾生知如幻者身心亦幻云何以幻還修於幻此問從前知是空華即無輪轉等文而來意云身心既如幻能知亦是幻將幻還除幻幻幻何窮盡幻者如世間幻法依草木等幻作人畜宛似往來動作之相須臾法謝還成草木然教中五者一真性二心識三依他起四我法即空五迷執我法下諸幻喻皆倣此知二難幻滅無修幻人若諸幻性一切盡滅則無有心誰為修行云何復說修行如幻若以幻故一切皆空能所總無遣誰修習三難不修云何解脫若諸眾生本不修行於生死中常居幻化曾不了知如幻境界令妄想心云何解脫眾生正覺理具情迷若非全性起修無從解脫故難雖三意歸修行而即一耶三申問意願為末世一切眾生作何方便漸次修習令諸眾生永離諸幻論云若人唯念真如不以方便種種熏修終無得淨對於蹔離故言永離謂初觀一體雖覺全真後遇八風紛然起妄行如窮子解似電光何法修之永離諸病三三展䖍誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告普賢菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生修習菩薩如幻三昧方便漸次令諸眾生得離諸幻汝今諦聽當為汝說末世眾生下義有問於如來之句二受旨時普賢菩薩奉教歡喜及諸大眾默然而聽三正答二初長行三初略示所依善男子一切眾生種種幻化皆生如來圓覺玅心故經云知法常無性佛種從緣起故知九界實造佛界權施皆圓覺性之所發現諸大乘教詮旨咸然故云諸佛心內眾生心心作佛眾生心內諸佛念念證真一字法門海墨書之不盡並由理具方可云為二廣釋前難二初明幻滅覺存釋前二難三初喻顯猶如空華從空而有幻華雖滅空性不壞上文云空本無華病者妄執今云華從空有者欲顯華滅空存故略於眼翳徑將華對空說其實因眼有翳故見空中生華應知病眼見空華時其華全體是空翳除華滅而虗空之體本無增減性之善惡闡提與佛莫斷纖毫故云空性不壞二說法眾生幻心還依幻滅諸幻盡滅覺心不動上二句釋前初難以幻修幻下二句釋前次難幻滅無心既知幻從覺生從真起妄即識返迷歸悟全性起修則以幻修幻無可疑也況覺性圓常俱體俱用諸幻雖盡不入斷滅則幻滅無心誰為修行故難易自釋覺心不動也三拂迹依幻說覺亦名為幻若說有覺猶未離幻說無覺者亦復如是是故幻滅名為不動依幻說覺亦名為幻者對幻說覺猶屬順迷相待之義既涉言思覺成不覺學者應知創心入道對境立觀之日須分幻覺用觀照境之時真妄泯合若說有覺猶未離幻者未離見思也說無覺者亦復如是者未離塵沙也是故幻滅者二邊心滅即斷無明中道得立三觀皆中名為不動也二約勸修幻行釋第三難三初法善男子一切菩薩及末世眾生應當遠離一切幻化虗妄境界由堅執持遠離心故心如幻者亦復遠離遠離為幻亦復遠離離遠離幻亦復遠離得無所離即除諸幻離幻有四一離諸幻之境境為所離智為能離二離離幻之心由堅執有能離之智此智亦幻故曰心如幻者亦復遠離三遣離幻之離離前能離此離亦幻故云遠離為幻亦復遠離四遣離離之離離前第三此心亦幻故曰離遠離幻亦復遠離此之四番皆是以幻修幻列雖次第修在一心所謂一念不生前後際斷得無所離即除諸幻者結示得體除幻學者果能向幻覺未兆之前如來未說示處體之照之覺性本然得無所離則何德不顯何幻不除也二喻譬如鑽火兩木相因火出木盡灰飛煙滅如有一段乾木以一木燧鑽之火出還將却燒二木木火既盡煙自然滅既成灰燼任運飛散木段喻所修幻妄木燧喻能修幻智煙喻離火喻遣經文圭峰云先云灰飛譯者倒也合是煙先滅餘灰飛散式師云灰猶有實煙最浮虗亦不須責譯文之倒但今謂約喻喻法何須難喻也三合以幻修幻亦復如是諸幻雖盡不入斷滅上二句正合今勸修幻行釋第三難舉初難之詞為合法者蓋問雖有三意歸修在一也下二句重結所依覺性常住使修行永無疑綱三頓相結酬善男子知幻即離不作方便離幻即覺亦無漸次一切菩薩及末世眾生依此修行如是乃能永離諸幻修圓觀者造境即中不段事禪方便三觀一心亦無漸次知幻即離結妙境也離幻即覺結妙觀也一切下結酬前文所請作何方便漸次修習故佛結答不作方便亦無漸次會通問文也能知是幻已名為離但得離幻即元是覺更無階級漸轉為覺如人夢見身瘡問醫求藥窹來既知是夢更欲作何方便若待方便之漸離即是實法何名幻化若執實有還是妄也二重頌二初標舉爾時世尊欲重宣此義而說偈言二頌四初頌所依覺體普賢汝當知一切諸眾生無始幻無明皆從諸如來圓覺心建立無明之言長無偈有二頌幻滅覺存猶如虗空華依空而有相空華若復滅虗空不動轉幻從諸覺生幻滅覺圓滿覺心不動故展轉拂迹長有偈無三頌勸修幻行若彼諸菩薩及末世眾生長應遠離幻諸幻悉皆離如木中生火木盡火還滅合法之文長有偈無四頌結頓修相覺即無漸次方便亦如是亦如是者不作方便也頌略結酬今普眼請云演說菩薩修行漸次答中具明戒定觀慧結酬又云如是修行如是漸次所謂解圓行次也於此分四初普眼章正明漸次行證二初請問三初進威儀於是普眼菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正述請問二初正請大悲世尊願為此會諸菩薩眾及為末世一切眾生演說菩薩修行漸次云何思惟云何住持眾生未悟作何方便普令開悟前聞頓行不依方便恐漸次機謂知即已都不假修故復請漸行修戒定慧開悟圓覺云思惟者繫緣法界達陰本空云住持者安心實相不起妄念稟戒習定助成觀慧故云方便二述意世尊若彼眾生無正方便及正思惟聞佛如來說此三昧心生迷悶即於圓覺不能悟入願興慈悲為我等輩及末世眾生假說方便為迷悶者重扣所修故略開悟住持只言方便與思惟耳又假說方便者上請六事無非出於善巧故今結請只以方便兼之於無修證中強言修證故云假說方便也三三展䖍誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告普眼菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生問於如來修行漸次思惟住持乃至假說種種方便汝今諦聽當為汝說二受旨時普眼菩薩奉教歡喜及諸大眾默然而聽三正答二初長行三初標意善男子彼新學菩薩及末世眾生欲求如來淨圓覺心應當正念遠離諸幻夫淨圓覺心諸佛眾生各各本具今欲求者二邊皆中故云正念遠離諸幻者指前標後也今謂秪是總標耳正念即標戒定慧諸幻即三學所離污戒之瑕玷障定之事性迷理之惑也二廣釋二初戒定先依如來奢摩他行堅持禁戒安處徒眾宴坐靜室奢摩他翻止止定也堅持禁戒戒也安處徒眾近善友知識而生慧也宴坐靜室即止息世緣閑居靜處諸緣世利而自然息已而欲明漸次行證直云戒定方便助成觀慧三學相由即答漸次之問也初約四大觀身如幻恒作是念我今此身四大和合所謂髮毛爪齒皮肉筋骨髓腦垢色皆歸於地唾涕膿血津液涎沫痰淚精氣大小便利皆歸於水暖氣歸火動轉歸風四大各離今者妄身當在何處即知此身畢竟無體和合為相實同幻化恒作是念者意止觀中不得暫捨大論云昔如來說四大無處不有故名為大各離者從昔妄執四大為身約俗諦和合而言今約真諦破之故云各離此中應用不自他等四句推之畢竟無體故能執情盡也二約根塵觀心寂滅二初根對心生四緣假合妄有六根六根四大中外合成妄有緣氣於中積聚似有緣相假名為心身本無形緣四大有故名四緣六根依身而具一往名中四大從外而攬一往名外中外圍空而心又在中間空處牢結故云於中積聚此緣即能緣心也不實如氣同上緣影皆顯體虗也無體則無相又豈有名故云假名為心也二塵消心寂善男子此虗妄心若無六塵則不能有四大分解無塵可得於中緣塵各歸散滅畢竟無有緣心可見若以從真起妄無明生法為言必先有不覺之心方有根塵世界今就日用覈之意顯因境有心無塵則無心也四大分解者地性無堅水性隨流風性無礙火性元虗謂四大各歸本性畢竟無有緣心可見也二結成觀相善男子彼之眾生幻身滅故幻心亦滅幻心滅故幻塵亦滅幻塵滅故幻滅亦滅幻滅滅故非幻不滅彼之眾生指前修觀人也前破身心及六塵境故此結云幻身滅等滅謂寂滅即空觀也幻塵滅故幻滅亦滅者生死既空涅槃亦滅假觀也後二句中道常住所謂諸幻雖盡不入斷滅然此觀相三智一心無惑不破如大圓鏡明像宛然常不雖故也二約喻顯二初明幻滅觀成二初喻譬如磨鏡垢盡明現夫鏡性本明非從外得塵覆則隱磨之則顯隱顯雖殊明性不異是以修觀如磨智鏡身心頓忘則種智圓矣二合善男子當知身心皆為幻垢垢相永滅十方清淨既以身心合幻垢則人法二執性之與相皆屬幻垢十方乃十界也清淨乃本具覺性顯現合上非幻不滅也二誡迷真執妄二初喻善男子譬如清淨摩尼寶珠映於五色隨方各現諸愚癡者見彼摩尼實有五色摩尼體性本無五色瑩淨絕瑕都無色相由性淨故一切色相對則現中青黃赤等五色各各隨方而現五色喻五道也隨方喻隨業愚人不了珠體但見全是青黃等故華嚴云凡夫見諸法但隨諸相轉不了法無我以是不見佛二合二初正合迷真善男子圓覺淨性現於身心隨類各應彼愚癡者說淨圓覺實有如是身心自相亦復如是隨迷染之氣類應現而有也亦復如是乃合上喻也其猶結水為氷詎可見氷而忘水也二破迷入理由此不能遠於幻化是故我說身心幻垢對離幻垢說名菩薩垢盡對除即無對垢及說名者本以眾生妄執幻化故佛說云幻垢眾生依教離垢故復說名菩薩所離之垢既無對離之智何立者字貫通兩句謂對垢者菩薩也說名者如來也既無對治之智何有起智之人深淺之執本無何有說教之者故俱無也二觀成歷法二初明證理善男子此菩薩及末世眾生證得諸幻滅影像故爾時便得無方清淨無邊虗空覺所顯發頓了實法假名性相等執當體如幻故云證得達緣影之心見鏡像之身本無故名為滅無方即無方所橫徧也無邊即無邊際堅深也由清淨故如虗空如虗空故得清淨此乃覺體顯發正是開悟之相所發之體也分二初別顯真淨四初世間諸法四初根識覺圓明故顯心清淨心清淨故見塵清淨見清淨故眼根清淨根清淨故眼識清淨識清淨故聞塵清淨聞清淨故耳根清淨根清淨故耳識清淨識清淨故覺塵清淨如是乃至鼻舌身意亦復如是清淨即空之異名故大論云畢竟空即畢竟清淨以人謂空故言清淨見塵者不單說外色名塵亦不說根識名塵根塵識三自有文故此見塵體還是我執之心就取相生過而別立名下皆牒見字不言塵者足顯即見是塵非外塵也聞等亦然二六塵善男子根清淨故色塵清淨色清淨故聲塵清淨香味觸法亦復如是六皆名塵者坌污心識故三四大善男子六塵清淨故地大清淨地清淨故水大清淨火大風大亦復如是四總例善男子四大清淨故十二處十八界二十五有清淨上明根識及六塵淨今復舉十二處十八界者以陰入界隨根開合故重總例二出世間法彼清淨故十力四無所畏四無礙智佛十八不共法三十七助道品清淨如是乃至八萬四千陀羅尼門一切清淨十力者一知是處非處力二業力三定力四根力五欲力六性力七至處道力八宿命力九天眼力十漏盡力四無所畏者一一切智二漏盡三說障道四說盡苦道四無礙智者一義二法三辭四樂說十八不共法者一身無失二口無失三念無失四無異想五不定心六無不知已捨七欲八精進九念十慧十一解脫十二解脫知見上六皆云無滅十三至十五身口意業隨智慧行十六至十八以智慧知過去未來現在三十七品者此有七科一四念處二四正勤三四如意足四五根五五力六七覺支七八正道謂三四二五單七隻八總三十七品也如是乃至者超越之辭三身四智五眼六通等八萬四千陀羅尼門悉皆清淨也三自他正報善男子一切實相性清淨故一身清淨一身清淨故多身清淨多身清淨故如是乃至十方眾生圓覺清淨論云照色等空即名實相實相本來自性清淨諸段清淨皆牒前文唯此獨指實相以為淨之所以既於自身證實相理亦見一切眾生同一清淨實相以觀一切眾生不取於相同圓覺性耶蓋顯彼我一體故十方亦應以十界釋之方與上聖下凡清淨一致也四一多依報善男子一世界清淨故多世界清淨多世界清淨故如是乃至盡於虗空圓褁三世一切平等清淨不動國土淨穢皆由自心眾生劫燒我土安隱況乃心宜覺性識智無生身土依真染淨俱泯亘通法界清淨湛然圓謂圓徧虗空褁謂含褁三世三世者豎極虗空者橫周一切者橫豎總該平等者本末味同清淨乃都結七段不動者宜於一如耶二例明不動善男子虗空如是平等不動當知覺性平等不動四大不動故當知覺性平等不動如是乃至八萬四千陀羅尼門平等不動當知覺性平等不動前歷諸法別顯清淨今以不動例明諸法四大總世間陀羅尼總出世間虗空之言總該依正及三世也經文避繁略云乃至下亦例此十界因果依正色空一切諸法既皆全性而作性本不動法亦同如矣二俗諦二初體量徧滿善男子覺性徧滿清淨不動圓無際故當知六根徧滿法界根徧滿故當知六塵徧滿法界塵徧滿故當知四大徧滿法界如是乃至陀羅尼門徧滿法界覺性無際故徧滿性徧滿故諸法徧也二體德無壞善男子由彼玅覺性徧滿故根性塵性無壞無雜根塵無壞故如是乃至陀羅尼門無壞無雜如百千燈光照一室其光徧滿無壞無雜根性塵性者此指自性非謂泯根攝塵歸於一性如百千燈等者如一燈光已滿一室更有一燈光亦全滿百千燈光一一如是各不相壞亦不混雜室中之空喻於法界燈之光相喻如根塵謂一燈光容多光相即一光相徧多光中故一一皆然重重無盡也三中諦三初亡憎愛善男子覺成就故當知菩薩不與法縛不求法脫不厭生死不愛涅槃不敬持戒不憎毀禁不重久習不輕初學何以故一切覺故譬如眼光曉了前境其光圓滿得無憎愛何以故光體無二無憎愛故覺者圓覺也成就者牒上開悟也縛脫約惑生死涅槃約報持戒毀禁約業久習切學約人喻取能照前境之眼光也於四對法無勝劣心同佛於三念之境同之所由經自徵釋云一切覺故眼光者光即眼識現量所得故無憎愛所以光體無二故也二亡修證善男子此菩薩及末世眾生修習此心得成就者於此無修亦無成就圓覺普照寂滅無二於中百千萬億阿僧祇不可說恒河沙諸佛世界猶如空華亂起亂滅不即不離無縛無脫始知眾生本來成佛生死涅槃猶如昨夢圓覺普照寂滅無二者自心已空但有覺照寧有凡聖差別之二冥一如之無心即萬動之恒寂故普照是用寂滅是體佛之所極極於寂照也諸佛世界者百千萬億僧祇等數之河一一河中一沙一世界者顯世界之多矣然盡虗空徧法界所有世界莫算其數為欲引機造無邊境故假增積多數爾又淨穢等土皆佛統之故云佛世界猶如空華亂起亂滅者緣無自性全體即真一切世界皆依妄念念既剎那不住界亦起滅不停又成住壞空雖各二十增減世界無量無數故觀起滅繽紛不即不離無縛無脫者文通上下上則世界無淨穢故下則眾生本成佛故始知等者始知即始覺本成即本覺始之與本非二覺故依正迷悟無非一如故喻空華及昨夢也三亡能所善男子如昨夢故當知生死及與涅槃無起無滅無來無去其所證者無得無失無取無捨其能證者無作無止無任無滅於此證中無能無所畢竟無證亦無證者一切法性平等不壞迷時生死無起涅槃無滅悟時非滅却生死發起涅槃稱體而觀都無起滅聖心無來凡心無去又直而言體無來去所證之境非得真失妄捨麤取玅能證之心都無分別離於四病故云畢竟無證亦無證者三結酬善男子彼諸菩薩如是修行如是漸次如是思惟如是住持如是方便如是開悟求如是法亦不迷悶二重頌二初標舉爾時世尊欲重宣此義而說偈言二正重三初頌觀陰普眼汝當知一切諸眾生身心皆如幻身相屬四大心性歸六塵四大體各離誰為和合者二頌歷法如是漸修行一切悉清淨不動徧法界無作止任滅亦無能證者一切佛世界猶如虗空華三世悉平等畢竟無去來三頌結酬初發心菩薩及末世眾生欲求入佛道應如是修習二金剛藏章釋成本來成佛由上普眼章末云始知眾生本來成佛故此疑問若本是佛何須前說發心修行斷無明耶分二初請問三初進問威儀於是金剛藏菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二陳詞請問三初慶前所悟大悲世尊善為一切諸菩薩眾宣揚如來圓覺清淨大陀羅尼因地法行漸次方便與諸眾生開發蒙昧在會法眾承佛慈誨幻翳朗然慧目清淨陀羅尼慧性因地法行定性此是一切行位根本後必躡前故重指也二述三疑世尊若諸眾生本來成佛何故復有一切無明若諸無明眾生本有何因緣故如來復說本來成佛十方眾生本成佛道後起無明一切如來何時復生一切煩惱初二句躡前文為疑本也三疑者初疑真能生妄次若諸下疑說妄為真三十方下牒而縱之責無窮過也此三難意者本來是佛煩惱何生若無生中妄生起者如來成佛本同無生無生之中還應妄起成佛義等生否應齊齊生則果佛何尊齊否則因違現事進退不可故有斯云三結意請答惟願不捨無遮大慈為諸菩薩開祕密藏及為末世一切眾生得聞如是修多羅教了義法門永斷疑悔通論疑者猶豫為性能障信心別顯五蓋中疑有三一疑自謂己不能入理二疑師謂彼不能善教三疑法謂於所學為令出離為不出離如有病人疑自疑醫疑藥病終不能愈今三疑中即疑法也悔是不定之法悔正則偏悔偏則正今請永斷又屬偏邪然入道人若未通決生佛同異則或用功多而反增疑悔也三三展䖍誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告金剛藏菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生問於如來甚深祕密究竟方便是諸菩薩最上教誨了義大乘能使十方修學菩薩及諸末世一切眾生得決定信永斷疑悔汝今諦聽當為汝說二受旨時金剛藏菩薩奉教歡喜及諸大眾默然而聽三正答二初長行四初反責起疑之本三初總指輪迴善男子一切世界始終生滅前後有無聚散起止念念相續循環往復種種取捨皆是輪迴一切世界總指情器也若不約情何成輪迴次下六對辯其輪迴謂但住有為即屬輪迴心也始終者創變極證生滅者新新續起而念念落謝前後者過去未來有無者住劫空劫聚散者成劫壞劫起止者現行調伏念念相續者情界器界皆依妄念既所依不斷故能依亦然循環往復者器界空已復成情界滅已復生惑業襲習報應綸輪塵沙劫波莫之遏絕取謂取著執我我所捨謂捨雖厭苦所依若取若捨種種不同皆是顛倒妄心變現輪迴之相也二真隨妄轉三初約法未出輪迴而辨圓覺彼圓覺性即同流輪若免輪迴無有是處能是輪迴之心故所觀圓覺亦爾如夢見寶物物亦是夢二舉喻譬如動目能搖湛水又如定眼猶迴轉火雲駛月運舟行岸移亦復如是由目數動湛水如波搖如人動轉眼睛或手研揑眼角故所見物顛倒動轉也次眼識遲鈍旋火成輪相如人燒杖頭以手旋之眼識不能迅速趂及即見亦輪之相岸移月運但是雲駛舟行駛者奔流急走之相故動目能搖湛水喻妄中真定眼隨轉火喻真中妄雲月舟岸喻圓覺性即同流轉也三法合善男子諸旋未息彼物先住尚不可得何況輪轉生死垢心曾未清淨觀佛圓覺而不旋復諸旋者目眼雲舟喻生死垢心彼物者水火月岸喻於圓覺玅性何況下正合也三結指前疑是故汝等便生三惑指前三疑為三惑非見思塵沙無明之惑二喻釋現起之疑二初約性德離妄通釋三疑三初譬喻善男子譬如幻翳妄見空華幻翳若除不可說言此翳已滅何時更起一切諸翳何以故翳華二法非相待故亦如空華滅於空時不可說言虗空何時更起空華何以故空本無華非起滅故不知華因翳有妄執從空而生豈覺迷真故著橫執真能生妄既了翳差都不見華因除迷心故清淨矣又執早晚更迷猶說何時更翳故云不可請問翳差之者或時更起未必永無如何為喻答曰夫喻者但當日一席之事不可說終身譬如夢覺豈可難哉云何妨明夜更睡還夢翳華二法非相待故但翳故妄非華生也二法合生死涅槃同於起滅妙覺圓照離於華翳迷見生死似華起悟得涅槃似華滅言圓覺離華離翳則雙拂生死無明虗空非蹔有無覺性何關迷悟眾生既知華起約誰更難無明無明生死既空何責本來成佛空華終不再起果位何得還迷由己計度不休見他覺性流轉若如是解頓遣三疑三疑鉤鎻連環不是三科別答下金鑛喻即答佛不再迷此疑理深故重喻也三結況復善男子當知虗空非是蹔有亦非蹔無況復如來圓覺隨順而為虗空平等本性此以世空喻真空也而虗空世法尚不同華起滅況如來隨順圓覺湛然真常是虗空之體性耶二約修德顯真別申後難善男子如銷金鑛金非銷有既已成金不重為鑛經無窮時金性不壞不應說言本非成就如來圓覺亦復如是金在鑛中銷鑛金現非銷始有若因銷有銷頑石等亦應有金故知雖假爐冶銷鎔金性要須本有既已成金等者此明在鑛則隱出鑛則顯隱顯雖殊金性常一不應說言本非成就者釋成金性本有也如來圓覺亦復如是者合也前就圓悟之理生佛俱是本真以成普眼章中眾生成佛之義故舉空華元來不起非後始滅法合云生死涅槃同於起滅所以俱通三難今就不壞因果之相故說銷鑛出金華則始終本無鑛乃因銷始盡也三示性令息妄心三初覺性圓常善男子一切如來妙圓覺心本無菩提及與涅槃亦無成佛及不成佛無妄輪迴及非輪迴玅圓覺性平等常住即一切法離一切相若有少見即非圓覺二思惟罔測二初舉況善男子但諸聲聞所圓境界身心語言皆悉斷滅終不能至彼之親證所現涅槃何況能以有思惟心測度如來圓覺境界此舉劣況勝也無餘涅槃身智俱寂有思惟心終不能至何況測度如來圓覺境界初小聖理智對二凡心真覺對意云小聖尚不能親到真智之理何況凡心劣於前智真覺者哉二喻顯如取螢火燒須彌山終不能著以輪迴心生輪迴見入於如來大寂滅海終不能至須彌梵語也翻云妙高峰此山四寶所成故輪迴心即思惟心也三指前勸誡是故我說一切菩薩及末世眾生先斷無始輪迴根本若遠指前文即文殊章先斷無明或指餘經皆如是說取捨輪迴意令先斷今重舉以勸誡也四結疑情非問三初展轉妄想善男子有作思惟從有心起皆是六塵妄想緣氣非實心體已如空華用此思惟辨於佛境猶如空華復結空果展轉妄想無有是處二巧見不成方便善男子虗妄浮心多諸巧見不能成就圓覺方便指前疑情者為浮心巧見也故不成方便三結非正問如是分別非為正問前讚善哉者美其起教此責非正者顯其實理此一段疑最障修證若不徵起末世長迷剛藏所徵意在佛責故知責此之過始彰徵有功乍看似前後乖違細詳乃始終符合可審翫味玅在斯焉二偈頌二初標舉爾時世尊欲重宣此義而設偈言二正頌四初頌反責疑本金剛藏當知如來寂滅性未曾有終始若以輪迴心思惟即旋復但至輪迴際不能入佛海長行先舉妄想偈文先舉實性二頌喻釋現疑譬如銷金鑛金非銷故有雖復本來金終以銷成就一成真金體不復重為鑛三頌示性息妄生死與涅槃凡夫及諸佛同為空華相向明覺性元常與喻中合文意同故空華喻義通前後四頌結斥疑情思惟猶幻化何況詰虗妄若能了此心然後求圓覺初二句長行云用此思惟辨於佛境猶如空華復結空果詰者辨也次二句依解起行與前結非正問互顯三彌勒章顯示輪迴根本由前章云先斷無始輪迴根本今窮根本及能斷性分二初請問三初進問威儀於是彌勒菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二陳詞正請三初慶前聞大悲世尊廣為菩薩開祕密藏令諸大眾深悟輪迴分別邪正能施末世一切眾生無畏道眼於大涅槃生決定信無復重隨輪轉境界起循環見述問有四先問輪迴根本次問輪迴種性三問行門深淺四問度生方便總而不出所斷及能斷者前輪迴始終生滅等說妄名邪圓覺了義是正起循環見者如前三惑也初問所斷輪迴世尊若諸菩薩及末世眾生欲遊如來大寂滅海云何當斷輪迴根本於諸輪迴有幾種性云何當斷輪迴根本者雖問當斷意在根本下文即指恩愛貪欲如伐木尋根灸病求穴也於諸輪迴有幾種性者上總云種種取捨皆是輪迴今究種種之的有幾等輪迴之數答中指出四生九類六道輪迴二問能斷行願修佛菩提幾等差別迴入塵勞當設幾種教化方便度諸眾生初二句問意者道雖平等行有淺深故下答以依二種障五性差別迴入塵勞等者即請下大悲方便化他願力也三結請知見惟願不捨救世大悲令諸修行一切菩薩及未世眾生慧目肅清照曜心鏡圓悟如來無上知見慧目如如智也心鏡如如境也境智冥合無上知見隨機也三三展䖍誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告彌勒菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世眾生請問如來深奧祕密微妙之義令諸菩薩潔清慧目及令一切末世眾生永斷輪迴心悟實相具無生忍汝今諦聽當為汝說實相者離虗妄也生死涅槃俱寂滅故無生忍者是決定之義也證得諸常實相名無生忍以位對之名初住也二受旨時彌勒菩薩奉教歡喜及諸大眾默然而聽三正答二初長行二初廣答二初答所斷輪迴三初指根本善男子一切眾生從無始際由有種種恩愛貪欲故有輪迴對五塵境起於貪欲種種相續三有輪迴往來流轉無時斷絕或屬天地之恩如父母等或因事之恩如得惠賚等或任運生愛即自身六親及名利等或因敬成愛或因愛結恩或因愛生情或因情成愛應成四句謂恩非愛等故能貪之愛種多所貪之境不一若對治簡境則有順有乖若約法簡心則皆為過患二明種性二初總示四生三初命因欲有若諸世界一切種性卵生胎生濕生化生皆因淫欲而正性命卵胎濕化果也淫欲而正性命因也顯是前文於輪迴有幾種性之問故下文云欲因愛生命因欲有眾生愛命還依欲本而以四生配六道者天及地獄化生鬼通胎化謂鬼子及地行羅剎是胎餘皆化生人畜各四生具四者毗舍佉母卵生三十子胎則當人濕則奈女化則劫初畜具四者金翅及龍餘獸皆胎餘鳥皆卵然著地飛空若水若陸微細蠢動或胎或卵或化不可具分品類皆因淫欲而正性命者淫謂淫染愛著但是情染總名為淫縱使化生亦依業染且約欲界輕重者六受交抱執手笑視淫既性命由淫淫復由愛故云愛為根本也二欲滋於愛當知輪迴愛為根本由有諸欲助發愛性是故能令生死相續雖四生性命以欲為因然而欲因愛生以愛為本復由諸欲滋發愛性故使果報無窮輪迴相續也三結成因果欲因愛生命因欲有眾生愛命還依欲本愛欲為因愛命為果眾生受命還依欲本者愛謂貪愛命謂身命雖欲因愛生命因欲有由欲滋助於愛果報無窮故曰還依欲本二別明六趣二初別示二初惡趣生由於欲境起諸違順境背愛心而生憎嫉造種種業是故復生地獄餓鬼違順皆是造業之境由愛彼境境不順心便生熱惱憎嫉憎嫉故起生嗔嗔故殺害逼惱打罵凌辱種種惡業從此便興亦可境稱愛心而生耽著侵奪飲啖綺妄淫盜種種善惡等業無畜生者取其順文成句略也義必合有故華嚴云十不善業道上者地獄因中者畜生因下者餓鬼因二天人知欲可厭愛厭業道捨惡樂善復現天人知欲可厭者離惡道因深生愛樂捨惡樂善復感善道人天樂報之因也三定地又知諸愛可厭惡故棄愛樂捨還滋愛本便現有為增上善果知其愛惡愛善俱未免離棄彼愛心樂修捨法即四禪八定而不知樂捨之心還同彼愛故云還滋愛本增上善果者上二界殊勝依正二報也二總結皆輪迴故不成聖道三勸令斷三初正勸是故眾生欲脫生死免諸輪迴先斷貪欲及除愛渴貪欲愛渴是業惑因欲出輪迴先除此二愛渴者愛心至切如渴湏飲也二釋疑善男子菩薩變化示現世間非愛為本但以慈悲令彼捨愛假諸貪欲而入生死恐疑者云既令捨愛何故菩薩亦有愛生耶故此通云示現受生非愛為本但以大悲同事利物故淨名云眾病即菩薩病也三顯益若諸末世一切眾生能捨諸欲及除憎愛永斷輪迴勤求如來圓覺境界於清淨心便得開悟先能除捨方可勤求如出鑛金始堪為器前但云貪愛此云憎愛境不順心違情故憎是知憎亦由愛故雖兼憎意但說愛永斷三障即名勤求三障斷處心清淨矣二答能斷行願二初行性差別二初總標善男子一切眾生由本貪欲發揮無明顯出五性差別不等依二種障而現深淺一切眾生枉受輪轉只為忽生一念發揮一切無明境界淺深二障差別五性事障麤重為淺理障微細為深淺故先除深故後斷此以障道近遠名為事理淺深五性差別不等故也二別釋二初二障云何二障一者理障礙正知見二者事障續諸生死根本無明親障中道名理障枝末無明牽生三界名事障約界內外對論事理小乘真理望大乘還屬變易生死大乘變易生死對小乘屬真理下明二乘先斷事障即知是見思也二五性二初徵云何五性一凡夫性二二乘性三菩薩性四不定性五外道性此皆新熏不同法相宗說然亦未可會同相宗五性今經但云未成非永無成佛之義也二釋五初凡夫性善男子若此二障未得斷滅名未成佛因緣生法所觀之境六道凡夫也約此未斷未證為一種顯下趣向斷證為四種爾二二乘性若諸眾生永捨貪欲先除事障未斷理障但能悟入聲聞緣覺未能顯住菩薩境界同斷見思同出三界但教有諦緣惑論正習緣覺乃是侵習小異耳三菩薩性善男子若諸末世一切眾生欲泛如來大圓覺海先當發願勤斷二障二障已伏即能悟入菩薩境界若事理障已永斷滅即入如來微妙圓覺滿足菩提及大涅槃發願斷障義兼四弘二障已伏即當圓教觀行之位悟入者解二障永滅方是證悟事障若盡入圓十信理障若盡圓教初住極至妙覺圓滿菩提歸無所得四不定性善男子一切眾生皆證圓覺逢善知識依彼所作因地法行爾時修習便有頓漸若遇如來無上菩提正修行路根無大小皆成佛果一切眾生皆證圓覺者蓋圓覺體性離一切法具一切相故爾學者當依了義莫依他人可也若遇如來無上菩提圓覺修證無不取極根無大小皆成佛道若依彼人所作之法故有淺深差別未及圓覺了義者也五外道性若諸眾生雖求善友遇邪見者未得正悟是則名為外道種性邪師過謬非眾生咎本非外道由不遇真正知識善友心行理外故名外道三結是名眾生五性差別今云五性中菩薩性不定性皆悟圓覺豈得屬輪迴耶須知菩提乃所學之法眾生是能學之人但造之有差遂成五別也二悲願度生善男子菩薩唯以大悲方便入諸世間開發未悟乃至示現種種形相逆順境界與其同事化令成佛皆依無始清淨願力大悲乃拔苦之本心方便為設化之通軌示現形相如觀世音隨類應身逆順者或為親友以引之或為怨家以怖之同事者四攝之一意該餘三謂布施愛語利行清淨願力非希望報恩亦非愛見同體大悲清淨大願性本具之非別新得二結酬若諸末世一切眾生於大圓覺起增上心當發菩薩清淨大願應作是言願我今者住佛圓覺求善知識莫值外道及與二乘取願修行漸斷諸障障盡願滿便登解脫清淨法殿證大圓覺玅莊嚴域圓信諸法即大圓覺名增上心普會自他具入實際是菩薩願一切勝行無願不克如普賢十大願王為無量勝行之本清淨法殿妙莊嚴域皆是所證圓覺之境也二偈頌二初標舉爾時世尊欲重宣此義而說偈言二正頌四初頌根本彌勒汝當知一切諸眾生不得大解脫皆由貪欲故墮落於生死二頌勸斷若能斷憎愛及與貪嗔癡不因差別性皆得成佛道二障永消滅求師得正悟隨順菩薩願依止大涅槃初兩句正頌勸斷中顯益之文因斷必果亡故略不頌輪迴種性又以斷妄即得會真故連頌不定性菩薩性餘三性略得正修行能斷貪欲根無本小皆成佛道故曰不因差別性皆得成佛故三頌悲願十方諸菩薩皆以大悲願示現入生死四頌結酬現在修行者及末世眾生勤斷諸愛見便歸大圓覺四清淨慧章判修證高下二初請問三初進問威儀於是清淨慧菩薩在大眾中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句二初慶前大悲世尊為我等輩廣說如是不思議事本所不見本所不聞我等今者蒙佛善誘身心泰然得大饒益二請後二初正問位次願為一切諸來法眾重宣法王圓滿覺性一切眾生及諸菩薩如來世尊所證所得云何差別舉所證覺性問能證位地覺心一味因果階差二義既乖故須起問二願益未來令末世眾生聞此聖教隨順開悟漸次能入三三展䖍誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告清淨慧菩薩言善哉善哉善男子汝等乃能為末世眾生請問如來漸次差別汝今諦聽當為汝說二受旨時清淨慧菩薩奉教歡喜及諸大眾默然而聽三正答二初長行二初明六即位次有二謂理同故即事異故六若知理同迷悟平等免於退屈若知事異因果不濫免憎上慢屬初理即聞圓頓教屬名字即五品觀行即十信相似即十住十行十迴向十地等覺四十一位總為分真即玅覺即名究竟也初法二初正示理同善男子圓覺自性非性性有循諸性起無取無證於實相中實無菩薩及與眾生圓滿覺性三諦具足自性中也非性空也性有假也有是具義以性具十界循界性而緣起法法即生是則菩薩眾生本是實相復何取證於其間哉二徵釋所以何以故菩薩眾生皆是幻化幻化滅故無取證者以性奪修故菩薩眾生二皆如幻指幻即性同一圓覺故不復有能取證者二喻譬如眼根不自見眼若是不明隨緣不變幻化即性只作遣蕩釋上者何當此喻眼只是一誰為能見誰為所見三合性自平等無平等者圓覺自性性自平等性不自謂無平等者初總明大義二初迷悟差別眾生迷倒未能除滅一切幻化於滅未滅妄功用中便顯差別眾生迷倒五住煩惱也一切幻化十界因果也未能除滅滅未滅者達未達也二復性一如若得如來寂滅隨順實無寂滅及寂滅者諸佛同證寂滅之理若得隨順與本相應無乖違也後二句亡能所實無寂滅之法亦無能寂滅者二別示即六初理即善男子一切眾生從無始來由妄想我及愛我者曾不自知念念生滅故起憎愛耽著五欲一切眾生從無始來本體元無因妄故有四生六道八難三途無不皆然曾不自知心既念念無常我亦念念生滅故生憎愛耽著五欲也二名字即若遇善友教令開悟淨圓覺性發明起滅即知此生性自勞慮善友知識也教令稟教也開悟知解也知我身心是本覺性起亦圓覺滅亦圓覺解妄為真故二發明此生勞慮雖未能忘到此已知全體而起故曰性自也三觀行即若復有人勞慮永斷得法界淨即彼淨解為自障礙故於圓覺而不自在此名凡夫隨順覺性此位頓伏三惑觀與理冥故云勞慮永斷得法界淨既伏必斷名為永斷然此觀解尚存能所故障圓覺而不自在隨順只是凡夫相應之義也四相似即善男子一切菩薩見解為礙雖斷解礙猶住見覺覺礙為礙而不自在此名菩薩未入地者隨順覺性見前淨解為礙故斷解礙然能見智名曰見覺先斷見思塵沙二惑得六根淨若住此見還名覺礙礙於圓覺不自在也天台十乘有離法愛離此見覺入後分真請問前位頓伏三惑此何二惑先斷答曰初心用觀事理頓忘三觀一心故能圓伏然智有微著惑有麤細約智明斷不無前後初證理三初法善男子有照有覺俱名障礙是故菩薩常覺不住照與照者同時寂滅有照有覺指前二位照是淨解覺是見覺二皆有住故俱名礙稱性之照故云常覺照而非照故云不住又照是所照者是能能所俱泯故云照與照者同時寂滅二喻譬如有人自斷其首首已斷故無能斷者人喻能照首喻所照所照既寂能照亦亡三合則以礙心自滅諸礙礙已斷滅無滅礙者實相無念有照即礙若立能照照達妄念還成礙也初忘教修多羅教如標月指若復見月了知所標畢竟非月一切如來種種言說開示菩薩亦復如是夫設言象在於得意無言象而倒惑執言象而迷真故以標月之指喻於言教謂見須藉指端悟心須假佛教因指見月見月忘指因教詮心悟心忘教是以觀指則失真月執教乃未達本心意令證實忘標故云畢竟非月也二結位此名菩薩已入地者隨順覺性若云入地方破無明是別教義今是圓位借別名耳四十一位之所同依故總云地六究竟即三初標境善男子一切障礙即究竟覺得念失念無非解脫成法破法皆名涅槃智慧愚癡通為般若菩薩外道所成就法同是菩提無明真如無異境界諸戒定慧及淫怒癡俱是梵行眾生國土同一法性地獄天宮皆為淨土有性無性齊成佛道一切煩惱畢竟解脫初標二句總也列十對法皆同真實一識智對無念則得其正念是智有念則為失念是識也念本自空元是無念故皆解脫二成破對眾緣相會曰成緣離曰破緣無自性成破一如三愚智對癡從分別生分別亦非有智慧與愚癡平等無差別四邪正對若在道者無分邪正五真妄對迷時真如是妄想悟則妄想是真如六染淨對夫戒定慧翻於三毒三毒本空元是梵行七依正對涅槃云我以佛眼徧觀三界有情無情一切人法悉皆究竟八苦樂對極惡業成天宮即見地獄極善業熟地獄即是天宮二業之念由心地獄天宮豈定九有性無性對有性者三乘性無性者闡提性非惟他日迴心現已齊成佛道十縛解對根塵同源縛脫無二識性虗妄猶如空華然煩惱依識識性既空煩惱何縛故云一切障礙即究竟覺如上十對其意不殊佛證覺心心無取捨故得諸法普同圓玅也二明照法界海慧照了諸有猶如虗空慧深如海照了一切諸法皆空三結位此名如來隨順覺性結果位也論云菩薩地盡滿足方便一念相應覺心初起心無初相以遠離微細心念故得見心性心即常住名究竟覺初圓修行相二初的示安心善男子但諸菩薩及末世眾生居一切時不起妄念於諸妄心亦不息滅住妄想境不加了知於無了知不辨真實文有四節每節二句妄念攀緣取著外法也念則違覺故令不起若求真捨妄如棄影勞形若滅妄存真似揚聲止嚮境從心現元是自心若加了知即迷現量能知既寂即真實知真實即知誰知真實如眼不自見等行者當知一切時處身心依正俱是法界常空如珠走盤無可留影性德玅行無越是矣二依法決悟入彼諸眾生聞是法門信解受持不生驚畏是則名為隨順覺性善男子汝等當知如是眾生已曾供養百千萬億恒河沙諸佛及大菩薩植眾德本彼當機眾中聞此大方廣圓覺了義修多羅經領受任持坦然合道驗今開悟頓契佛心方達宿因曩承熏習而來也三印成佛智佛說是人名為成就一切種智一切種智由斯而得因果相攝決無疑已是以如來印言成就一大事故二偈頌二初標舉爾時世尊欲重宣此義而說偈言二正頌三初頌理同故即清淨慧當知圓滿菩提性無取亦無證無菩薩眾生二頌事異故六覺與未覺時漸次有差別眾生為解礙菩薩未離覺八地永寂滅不住一切相大覺悉圓滿名為徧隨順初頌二句總標次一句觀行次一句相似二句分證二句究竟缺理即名字亦可以覺而未覺兼之也三頌入位法門末世諸眾生心不生虗妄佛說如是人現世即菩薩供養恒沙佛功德已圓滿雖有多方便皆名隨順智後二句總頌位行雖然各別皆隨順也以上圓頓漸次已週向下顯示不定行證
