body:
  text: 威德章顯示不定行證體用二初請問三初進問威儀於是威德自在菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言於是二字躡前之語故諸章初皆云於是即從座起者從法空之體起悲濟之用以己最勝之頂禮佛最尊之足右繞三匝隨順之義一體三寶也長跪者安危不易叉手者信解合體心境交參權實合也二正詞句三初慶前大悲世尊廣為我等分別如是隨順覺性令諸菩薩覺心光明承佛圓音不因修習而得善利覺心煥發故曰光明一念頓悟即是圓覺何藉劬勞肯綮修證也二請後二初舉喻立理世尊譬如大城外有四門隨方來者非止一路一切菩薩莊嚴佛國及成菩提非一方便城喻圓覺門喻行門前説觀行理趣分明今復咨詢忽涉異分故先立理請更投機二正請行法惟願世尊廣為我等宣説一切方便漸次并修行人總有幾種方便漸次問所修之行總有幾種能修行人有幾等惟願慈悲為説方便三顯益令此會菩薩及末世衆生求大乘者速得開悟遊戲如來大寂滅海三三展虔誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告威德自在菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來如是方便汝今諦聽當為汝説二受旨時威德自在菩薩奉教歡喜及諸大衆默然而聽三正答二初長行四初指體標行二初指體開解善男子無上妙覺遍諸十方出生如來與一切法同體平等於諸修行實無有二無上妙覺性德之體真妄同依遍諸十方出生如來體量周含諸佛同證與一切法同體平等以理融行行無不周體德遍具無非圓覺二標行舉數方便隨順其數無量圓攝所歸修性差別當有三種性德之行隨根修入根既多種法亦無窮病有千源藥生多品然核論性德三諦天然真諦者泯一切法俗諦者立一切法中諦者妙一切法至三即一至一即三處凡為三因在聖為三德天台謂之即空假中此經則以靜幻寂而為行相也二正明行相三初奢摩他三初標解善男子若諸菩薩悟淨圓覺發心修行欲趣佛果先須了悟淨圓覺心以為行本依本而修方為妙行膏明相賴目足更資故下標本皆同此矣二釋行二初修觀破障以淨覺心取靜為行由澄諸念覺識煩動靜慧發生身心客塵從此永滅念境也覺觀也若以三觀對破三惑此當空觀發一切智則客塵煩惱體是見思假破塵沙中破無明若凖次章單修靜行故曰永斷煩惱究竟成就不起于座便入涅槃既云究竟涅槃合是三德祕藏以證驗修必一觀而三觀三惑一體而破之也二行成顯德便能內發寂靜輕安由寂靜故十方世界諸如來心於中顯現如鏡中像由離根境內心自間寂靜清虗輕安調暢喧塵永息粗重長袪十方諸如來心於中顯現者此明感應衆生圓明性體與佛無殊但以妄情凡聖似隔今身心相盡妄念不生圓覺妙心凡聖交徹理實而言我之身心亦能遍觀十方佛中今但約入觀者為主故云諸佛於中顯現三結名此方便者名奢摩他此翻云止定之異名寂靜義也謂於染淨等境心不妄緣故寂靜是顯相止是釋名此既修止三皆名觀者此宗必具理事定慧皆無障礙故約止而修觀也三摩鉢提三初標解善男子若諸菩薩悟淨圓覺二釋行三初正示修發以淨覺心知覺心性及與根塵皆因幻化即起諸幻以除幻者變化諸幻而開幻衆由起幻故便能內發大悲輕安覺知根塵幻化不實識與根塵各無自性故名幻化諸幻即幻智也幻者即根本無明是能幻之者及除幻者依如幻始覺力分覺根本不覺變化等者隨機應化説法開示如幻衆生根塵即消自他無二故能內發同體大悲悲從定起非其愛見故輕安暢適也二重明離相一切菩薩從此起行漸次增進彼觀幻者非同幻故非同幻觀皆是幻故幻相永離一切菩薩等復牒所彼觀下正明離相非同幻故者約智忘境非同幻觀等能照亦寂謂非同幻境之觀亦皆是幻能所俱遣藥病兩忘故云幻相永滅矣三總結舉喻是諸菩薩所圓妙行如土長苗土喻性德苗喻觀行增進如土長苗成熟收子之時苗土一齊俱棄心土喻幻法苗喻幻智今謂經喻生長何以滅義消之耶三結名此方便者名三摩鉢提亦名三摩鉢底此云等至等持之中能至聖位故圓覺章云三摩正憶持也三禪那三初標善男子若諸菩薩悟淨圓覺二釋行二初明不相礙以淨覺心不取幻化及諸靜相了知身心皆為罣礙無知覺明不依諸礙永得超過礙無礙境受用世界及與身心相在塵域如器中鍠聲出于外煩惱涅槃不相留礙禪觀之初覺明諸礙身心能所畢竟常然不取幻寂逈超絶待相在塵域如器中鍠音韻出外無知覺明至永得超礙無礙境如彼擊鐘其聲鍠然周遍法界受用世界了之身心生死涅槃不相留礙正顯雙遮二邊中道了義之妙觀也是以如器中鍠統攝萬行不取幻化及諸靜相隨順世界了然無礙唯佛極證本具之法故云如器中鍠等二重明離相便能內發寂滅輕安妙覺隨順寂滅境界自他身心所不能及衆生壽命皆為浮想寂滅即中諦之體菩薩住此故曰輕安妙覺隨順此非息動之寂生已而滅正是雙遮之體禪那之妙觀也三結名此方便者名為禪那此云靜慮正是中諦之本直作中觀釋之三總結彰圓善男子此三法門皆是圓覺親近隨順十方如來因此成佛十方菩薩種種方便一切同異皆依如是三種事業若得圓證即成圓覺此三法門皆依悟淨圓覺而起觀行觀行亦皆趣入圓覺始終不離故云親近隨順佛及菩薩同證同修隨機隨事往相各異或多人同修一門或一人具修多行然必皆依此三種事業或具修三或單或復具如二十五輪之所明也四較量顯勝善男子假使有人修於聖道教化成就百千萬億阿羅漢辟支佛果不如有人聞此圓覺無礙法門一剎那頃隨順修習偏小屬權圓乘稱性日月爝火焉得與齊也二偈頌二初標舉爾時世尊欲重宣此義而説偈言二正頌三初頌標指威德汝當知無上大覺心本際無二相隨順諸方便其數即無量如來總開示便有三種類二頌行相寂靜奢摩他如鏡照諸相如幻三摩提如苗漸增長禪那唯寂滅如彼器中鍠三頌總結三種妙法門皆是覺隨順十方諸如來及諸大菩薩因此得成佛三事圓證故名究竟涅槃辨音章明不定相上三法門約機偏好次第漸修一念圓修或單或復前後更互故曰不定行雖然不定解必依圓分二初請問三初進問威儀於是辨音菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句三初慶前所聞大悲世尊如是法門甚為希有二問機修習世尊此諸方便一切菩薩於圓覺門有幾修習前説三觀然雖行相分明未審菩薩所修為一人具三為三人各一為前後為次第三申請問三願為大衆及末世衆生方便開示令悟實相三三展虔誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告辨音菩薩言善哉善哉善男子汝等乃能為諸大衆及末世衆生問於如來如是修習汝今諦聽當為汝説二受旨時辨音菩薩奉教歡喜及諸大衆默然而聽三正答二初長行三初敘意標數善男子一切如來圓覺清淨本無修習及修習者一切菩薩及末世衆生依於未覺幻力修習爾時便有二十五種清淨定輪圓覺無修明所依本依未覺者明諸輪意輪者摧輾之義能摧惑障令正智轉是以依於未覺幻力修習者故有悟淨圓覺智德之行也初三輪單修初靜行若諸菩薩唯取極靜由靜力故永斷煩惱究竟成就不起于座便入涅槃此菩薩者名單修奢摩他二十五輪皆有標列然由靜心之力覺身心空瞥念尚無煩惱何縛故生死無據涅槃究竟矣二幻行若諸菩薩唯觀如幻以佛力故變化世界種種作用備行菩薩清淨妙行於陀羅尼不失寂念及諸靜慧此菩薩者名單修三摩鉢提雖變化種種作用修合觀心所照妙假亦可以自慈力名為佛力陀羅尼者中道總持圓覺了義之異名耳故前文云有大陀羅尼門名為圓覺三寂行若諸菩薩唯滅諸幻不取作用獨斷煩惱煩惱斷盡便證實相此菩薩者名單修禪那滅者絶待也獨者不假諸行而絶對待但與心相應煩惱是無便證實相也今每觀之中長科七段每輪辨其先後牒其觀名今恐文繁各舉一號前初云靜觀次云幻觀後云寂觀寂與靜殊前以具辨文三初七輪靜觀為首兼於幻寂中七輪幻觀為首兼於靜寂後七輪寂觀為首兼於靜幻初中後輪共二十一觀依文分列于後一運舟兼齊觀若諸菩薩先取至靜以靜慧心照諸幻者便於是中起菩薩行此菩薩者名先修奢摩他後修三摩鉢提菩薩離塵修定而運慧舟以化物兼之先取至靜而為標首以運慧舟兼修靜幻也二湛海澄空觀若諸菩薩以靜慧故證至靜性便斷煩惱永出生死此菩薩者名先修奢摩他後修禪那湛海則波瀾不動澄空而水性清明先以靜慧為標次後而修至寂見思二惑止也三摩醯三目觀若諸菩薩以寂靜慧復現幻力種種變化度諸衆生後斷煩惱而入寂滅此菩薩者名先修奢摩他中修三摩鉢提後修禪那三觀次第如摩醯首羅三目應之以靜幻寂為標故先靜次幻後寂也四三點齊修觀若諸菩薩以至靜力斷煩惱已後起菩薩清淨妙行度諸衆生此菩薩者名先修奢摩他中修禪那後修三摩鉢提三點是梵書伊字意修靜行禪力所加煩惱斷盡後起幻力度諸衆生含二利也五品字雙明觀若諸菩薩以至靜力心斷煩惱復度衆生建立世界此菩薩者名先修奢摩他齊修三摩鉢提禪那上單一口以至靜力先斷煩惱後起雙明幻寂齊修如下二口建立世界度諸衆生六獨足雙頭觀若諸菩薩以至靜力資發變化後斷煩惱此菩薩者名齊修奢摩他三摩鉢提後修禪那白澤圖中山精頭如鼓生二面目前後俱見此喻靜幻雙照二利齊運獨足如單禪七果落華敷觀若諸菩薩以至靜力用資寂滅後起作用變化世界此菩薩者名齊修奢摩他禪那後修三摩鉢提以寂靜之樹結涅槃之妙果復以幻觀入有情界度生無量同得妙果普皆饒益也一先文後武觀若諸菩薩以變化力種種隨順而取至靜此菩薩者名先修三摩鉢提後修奢摩他武王伐紂後鑄戈戟為農器喻此菩薩以先變化用功之後復入靜觀故先幻後靜二成功退職觀若諸菩薩以變化力種種境界而取寂滅此菩薩者名先修三摩鉢提後修禪那發心利生接物即是成功契世修寂滅行名為退職是以初幻而後修寂滅也三幻師解術觀若諸菩薩以變化力而作佛事安住寂靜而斷煩惱此菩薩者名先修三摩鉢提中修奢摩他後修禪那先起變化術法後歸本體空寂故云解術四神龍隱海觀若諸菩薩以變化無礙作用斷煩惱故安住至靜此菩薩者名先修三摩鉢提中修禪那後修奢摩他起幻術如神龍布雲雨歸本體入靜隱海故五龍樹通真觀若諸菩薩以變化力方便作用至靜寂滅二俱隨順此菩薩者名先修三摩鉢提齊修奢摩他禪那先起假幻後歸空寂如龍樹初行幻術廣化邪徒後習真乘自他皆成聖果六商那示相觀若諸菩薩以變化力種種起用資於至靜後斷煩惱此菩薩者名齊修三摩鉢提奢摩他後修禪那商那和修即優波毱多之師先以神力示相降伏毱多多乃慢心後即入定歸寂也是以雖化衆生不生於化其化大焉七大通宴默觀若諸菩薩以變化力資於寂滅後住清淨無作靜慮此菩薩者齊修三摩鉢提禪那後修奢摩他大通如來先以化用利物後歸宴默寂靜一寶明空海觀若諸菩薩以寂滅力而起至靜住於清淨此菩薩者名先修禪那後修奢摩他寶明是智慧空海即大定今靈心觀即本覺明如寶明也二虗空妙用觀若諸菩薩以寂滅力而起作用於一切境寂用隨順此菩薩者名先修禪那後修三摩鉢提圓覺體性猶如虗空而起妙用應化無窮三舜若呈神觀若諸菩薩以寂滅力種種自性安於靜慮而起變化此菩薩者名先修禪那中修奢摩他後修三摩鉢提舜若多神即虗空性忽遇日光映之暫現四飲光歸定觀若諸菩薩以寂滅力無作自性起於作用清淨境界歸於靜慮此菩薩者名先修禪那中修三摩鉢提後修奢摩他大迦葉先證本體次起神通後入定故五多寶呈通觀若諸菩薩以寂滅力種種清淨而住靜慮起於變化此菩薩者名先修禪那齊修奢摩他三摩鉢提多寶佛成道之後於寶塔中發起法華如靜幻無礙故六下方騰化觀若諸菩薩以寂滅力資於至靜而起變化此菩薩者名齊修禪那奢摩他後修三摩鉢提法華會上六萬恆沙菩薩從下方而現故七帝青含變觀若諸菩薩以寂滅力資於變化而起至靜清明境慧此菩薩者名齊修禪那三摩鉢提後修奢摩他帝青之寶含融物像對則隨應應而還空如靈心觀成含德用應緣起幻而復安靜後有一輪如意圓修三觀若諸菩薩以圓覺慧圓合一切於諸性相無離覺性此菩薩者名為圓修三種自性清淨隨順圓修妙觀造境即中故云圓合一切於諸性相無離覺性者夫以三軌三一往而然也實則一可以軌三也三可以軌一也離一無三也離三無一也三一俱忘奢摩他也一三圓融三摩鉢提也遮照一心即禪那也是則全心即境也全境即心也即心入無際之境即境入難思之心心境雙銷圓明一塊此乃如來開示了義之旨圓修三種之楷模也三總結勸修善男子是名菩薩二十五輪一切菩薩修行如是若諸菩薩及末世衆生依此輪者當持梵行寂靜思惟求哀懺悔經三七日於二十五輪各安標記至心求哀隨手結取依結開示便知頓漸一念疑悔即不成就開示修習法式梵行戒也寂靜定也思性慧也具戒定慧心在一門如是修行必定成佛內心寂靜外境俱捐懺悔求哀三七日中已彰懇禱書二十五輪名置道場中禮拜虔誠精祈一行若自的樂一門隨便修習據根驗理必在於茲無力等間輕於事相勝劣難分不能自決也二偈頌二初標舉爾時世尊欲重宣此義而説偈言二正頌三初頌敘意辨音汝當知一切諸菩薩無礙清淨慧皆依禪定生二頌修習所謂奢摩他三摩提禪那三法頓漸修有二十五種十方諸如來三世修行者無不因此法而得成菩提唯除頓覺人并法不隨順如來者長行不言且據因行今具舉因果耳唯除頓覺人并法不隨順者此二長行亦無謂今明不定行證故約漸頓明二十五種若圓頓行證之人并於此法不信順者則不可言無不因此得成菩提故曰唯除等三頌結勸一切諸菩薩及末世衆生常當持此輪隨順勤修習依佛大悲力不久證涅槃淨業章示我等四病二初請問三初進問威儀於是淨諸業障菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句三初慶前大悲世尊為我等輩廣説如是不思議事一切如來因地行相令諸大衆得未曾有覩見調御歷恆沙劫勤苦境界一切功用猶如一念我等菩薩深自慶慰廣説諸輪綺互於是覺性無差不思議事者如來因行也夫果德稱真約理可照因行治染體解是難今一念備知炳然齊現如琉璃瓶盛多芥子故深慰矣二合問世尊若此覺心本性清淨因何染污使諸衆生迷悶不入因聞上章圓覺清淨本無修習故今請扣除染污者須約修德故性德本覺何染污之有也三請答唯願如來廣為我等開悟法性令此大衆及末世衆生作將來眼三三展虔誠説是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告淨諸業障菩薩言善哉善哉善男子汝等乃能為諸大衆及末世衆生咨問如來如是方便汝今諦聽當為汝説二受旨時淨諸業障菩薩奉教歡喜及諸大衆默然而聽三正答二初長行三初略示二初舉過正酬二初從妄生妄善男子一切衆生從無始來妄想執有我人衆生及與壽命認四顛倒為實我體由此便生憎愛二境於虗妄體重執虗妄二妄相依生妄業道有妄業故妄見流轉厭流轉者妄見涅槃無始妄想者無中橫計妄執我人故有衆生可憎而有壽命可慈當知真我本有迷之謂無妄我本無執之謂有由此故下十句初四句由迷起惑次二句由惑造業次二句由業招報後二句反於三道墮於二乘又始教中所説生滅四諦初六句集諦次二句苦諦次一句道諦後一句滅諦由此便生憎愛二境為實我體順我者愛違我者憎於虗妄體重執虗妄二妄生因感苦樂果故名道業成即受生來死去流轉厭流轉者息緣斷惑住涅槃者趣寂沉空背性成迷故有染污是以迷悶不入也二障覺成迷由此不能入清淨覺非覺違拒諸能入者有諸能入非覺入故是故動念及與息念皆歸迷悶正是前問云何使諸衆生迷悶不入故此答云非覺違拒然本覺元如迷情自隔故非覺違不容入也其能入者離念即覺亦非覺性挽之何故動念著有息念沉空也二重核妄本三初徵牒何以故由有無始本超無明為己主宰動念既為背覺息念即合契真何以皆稱迷悶由有根本無明以為主宰故動是我動息是我息我人為主動息俱迷二轉釋一切衆生生無慧目身心等性皆是無明譬如有人不自斷命出世而來未逢明師指教開明猶如生盲動乖佛慧身心皆是無明如人愛命不自斷也三結過是故當知有愛我者我與隨順非隨順者便生憎怨為憎愛心養無明故相續求道皆不成就人若愛我歡喜則順人若違我煩惱則憎以此計度滋養無明從始至今無由休息相續不斷將此求道畢竟不成文為四初我相二初標顯粗執二初約法標善男子云何我相謂諸衆生心所證者於所學習忽悟自心我所證者者之一字正指現行見思之我體也二約喻顯善男子譬如有人百骸調適忽忘我身四肢弦緩攝養乖方微加針艾即知有我是故證取方現我體弦急緩慢支體不調手足失度之狀安則忘身針艾疼楚則認我也譬修行者無證則已有證則著故合云以是證取方現我體所以金屑雖貴落眼成塵是以下文云云何當知法不解脫二結指細相善男子其心乃至證於如來畢竟了知清淨涅槃皆是我相心證是如來下是所非但凡夫修時取證屬我乃至等覺後心二轉依號尚有我也二人相二初粗相善男子云何人相謂諸衆生心悟證者善男子悟有我者不復認我所悟非我悟亦如是悟已超過一切證者悉為人相學習既遣證理猶存故前者字正名人相不復認我豈作證心若存了悟同前非也二細執善男子其心乃至圓悟涅槃俱是我者心存少悟備殫證理皆名人相圓悟是能涅槃是所殫盡也既入地位除盡證理之執少存能盡之悟故成人相三衆生相三初標示善男子云何衆生相謂諸衆生心自證悟所不及者覺前能悟悟是所覺悟既成所覺亦名能展轉無窮皆成能所能所及處皆是相待了此無定故離前非計所不及謂免諸過不覺此計是衆生相二舉喻善男子譬如有人作如是言我是衆生則知彼人説衆生者非我非彼云何非我我是衆生則非是我云何非彼我是衆生非彼我故借世人語以為義勢顯衆生相非我非彼者以是衆生故非我也既云我是復非彼也非彼我故者非彼人之我三結指善男子但諸衆生了證了悟皆為我人而我人相所不及者存有所了名衆生相了證者空則我不及了悟者空則人不及存有所了名衆生相者若不存有所了即無者字也四壽命相二初正釋善男子云何壽命相謂諸衆生心照清淨覺所了者一切業智所不自見猶如命根覺前了見知覺未忘且云清淨存能照覺復若命根者字正指能覺之見一切業智所不自見者恐是凡聖所修業智不自見此能覺微念二顯妄善男子若心照見一切覺者皆為塵垢覺所覺者不離塵故如湯消氷無別有氷知氷消者存我覺我亦復如是若心照見前諸妄想稱一切覺此覺未忘皆名塵垢以存能覺覺所覺故不離塵垢者只是染污之義正顯能覺是妄也湯喻能覺氷喻所覺所覺既盡能覺豈存故云無別有氷知氷消者若執有氷能知氷消若執有氷則同存我覺我覺前我相故云存我覺我亦復如是二迷成法障三初存我失道三初標云善男子末世衆生不了四相雖經多劫勤苦修道但名有為終不能成一切聖果是故名為正法末世前法未生圓解終不能成圓教聖果博地凡夫故可知也正法末世者正宗佛法之末世也夫正法之時修則皆證末世之時人多取相今取證相則正法亦同末世若遇此法了達四病雖則末世還同正法也二徵釋五初久修如何不證徵何以故劫數既多行又勤苦以何義故不證聖果二認我取證非真釋認一切我為涅槃故有證有悟名成就故譬如有人認賊為子其家財寶終不成就世出世間無有一法不從我生故云一切賊若在外猶可隄防養之為兒如何檢護又知賊是賊賊無能為認之為兒寧免破敗三取證如何妨道徵何以故外境猶可制禦藏識難以辨明故如來藏中功德之寶念念耗散認賊為子以此貧窮縱使認我取證何以便妨於道四愛寂憎喧非解釋有我愛者亦愛涅槃伏我愛根為涅槃相有憎我者亦憎生死不知愛者真生死故別憎生死名不解脫夫生死輪回本由憎愛欲求解脫須盡二源起憎生死亦是我憎今愛涅槃還是法愛棄苦欣樂憎愛雖殊元是本習滯著修道佛果豈圓調伏心源即生死根因由著處似涅槃相此乃愛寂憎喧名不解脫五何知證法非脫徵云何當知法不解脫法者寂滅法也二乘之人所證界外別惑故此徵云若愛生死許是繫縛今悟涅槃寂滅之法以何相知非解脫也文二初標我未盡善男子彼末世衆生習菩提者以己微證為自清淨猶未能盡我相根本讚喜謗嗔驗我如實證必無我以無我故即無嗔喜如若非真我未盡也二驗境若復有人讚嘆彼法即生歡喜便欲濟度若復誹謗彼所得者便生嗔恨則知我相堅固執持潛伏藏識遊戲諸根曾不間斷世界違順粗重易明唯就法門最難覺察但是所為違嗔恨彼順濟度此不知此心元是我執潛伏藏識種子現行遊戲諸根因對外境驗得內心我執猶堅潛藏相續三總結善男子彼修道者不除我相是故不能入清淨覺二説病為法二初有説法善男子若知我空無毀我者有我説法我未斷故衆生壽命亦復如是因聞嗔喜是我妄計我空忘彼讚毀故云無毀我者然存我説法我猶未斷餘之三相未盡亦然文無人字為順句故二説亦成病善男子末世衆生説病為法是故名為可憐愍者雖勤精進增益諸病是故不能入清淨覺未盡四相總名為病以病為法誠可憐愍帶病修行反益諸病三以凡濫聖二初抑聖同己善男子末世衆生不了四相以如來解及所行處為自修行終不成就如來解行離四句絶百非住相而修豈得成就如執醍醐同毒矣二增上慢或有衆生未得謂得未證謂證見勝進者心生嫉妬由彼衆生未斷我愛是故不能入清淨覺未得於理未證於智謂得謂證增上慢人若自知不證而言證者則根本戒中成妄語罪夫聖人用心自他無二見他勝進法教流行念念歡喜必能隨順驗心如此即證悟不虗矣若自覺己衰他盛則嫉己盛他衰則喜縱令深解妙境但是心之所緣勿錯認之謂得謂證並由我愛故成障覺三誡勸三初誡勿求悟善男子末世衆生希望成道無令求悟唯益多聞增長我見此誡以心待悟也凡言悟者初無實法心言路絶強名悟耳若將心求悟則愈盛於迷故誡云無令又緣以心求悟遂於經論言句上解會故云唯益多聞殊不知解會分明底正是我人情識妄想故增長我見二勸令加行但當精勤降伏煩惱起大勇猛未得令得未斷令斷貪嗔愛慢諂曲嫉妬對境不生彼我恩愛一切寂滅佛説是人漸次成就求善知識不墮邪見但當之言與上無令相應得未得者決徹大法斷未斷者直截知見貪嗔等對境忘情也如此操履豈可便認為道如來説云漸次成就求善知識者商人航海須假導師學者修行必資善友三約失重示若於所求別生憎愛則不能入清淨覺海反顯不生憎愛即是如來大圓覺海故也二偈頌二初標舉爾時世尊欲重宣此義而説偈言二正頌三初頌略示淨業汝當知一切諸衆生皆由執我愛無始妄流轉二頌廣釋未除四種相不得成菩提愛憎生於心諂曲存諸念是故多迷悶不能入覺城法喻各有三義一了心性空衆惑不入如防外敵二見恆沙德萬行圓增如養人衆三道無不通如開門引攝四頌勸誡若能歸悟剎先去貪嗔癡法愛不存心漸次可成就我身本不有憎愛何由生此人求善友終不墮邪見所求別生心究竟非成就剎是世界如入中國率土屬中蕃境亦爾若到悟境則法法屬悟迷境亦爾癡則長無偈有慢則長有偈無文影略也法愛者愛涅槃也我身憎愛之本所依既空能依何有悟剎我身皆長無偈有故也普覺章示作等四病二初請問三初進問威儀於是普覺菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句二初慶前大悲世尊快説禪病令諸大衆得未曾有心意蕩然獲大安隱二請後世尊末世衆生去佛漸遠賢聖隱伏邪法增熾使諸衆生求何等人依何等法行何等行除去何病云何發心令彼羣盲不墮邪見如人有子病者偏憂菩薩大悲先哀末世賢聖隱伏正法將沉欲令廣益當來是故懸興此問又由前云求善知識不墮邪見今問求何人餘文皆顯令彼等明所為也三三展虔誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告普覺菩薩善善哉善哉善男子汝等乃能咨問如來如是修行能施末世一切衆生無畏道眼令彼衆生得成聖道汝今諦聽當為汝説二受旨時普覺菩薩奉教歡喜及諸大衆默然而聽二正答二初長行五初答求人二初教擇師善男子末世衆生將發大心求善知識欲修行者當求一切正知見人心不住相不著聲聞緣覺境界雖現塵勞心恆清淨示有諸過讚歎梵行不令衆生入不律儀求如是人即得成就阿耨多羅三藐三菩提大心者簡餘乘也知識者善能知真識妄如病識藥欲修行者當求解正知見人深解法空無相無作無生無滅了達諸法從本已來究竟平等性相如如住於實際是名真善知識心不住相者離凡夫煩惱及二乘滯寂雖現塵勞心清淨者染而無染也示諸過者以同事攝論云壞見之人雖不壞行不堪與衆生為其道眼雖壞行而不破見者是則人天真勝福田即得成就正等菩提二勸成事末世衆生見如是人應當供養不惜身命彼善知識四威儀中常現清淨乃至示現種種過患心無憍慢況復摶財妻子眷屬若善男子於彼善友不起惡念即能究竟成就正覺心華發明照十方剎不惜身命者如雪山捨身世尊尚然竭力精進何況為法四威儀中現清淨梵行乃至種種過患亦無憍慢夫菩薩應現權機難測但依法門莫疑其迹若復有師開示深義解破疑情于我有益可以盡心奉之摶財等者前舉身命之難此況身外之易摶者食也財謂錢帛譯者略也應云段食不起惡念由前無慢故也所以憍慢者起惡念隨生障覆自心法何得入心華等者覺心既明慧光開發觸向無染故曰心華稱體無邊照十方剎二答依法三初標法離病善男子彼善知識所證妙法應離四病標以妙法釋依圓覺圓覺是所依法故此圓覺離于四病方可依也除病之義下自有答法病無要唯此四隨有其一不堪為教授師也蓋出醫王慈悲深至不令雜毒而混醍醐故也二釋四病相二初徵云何四病指圓覺體性非造作如造作者可以契之若了覺性本圓不用興心求益不興益處即合覺心合覺心時即無諸妄無諸妄已所用相應但得妄盡即除諸病積土聚沙皆成佛道二釋四初作病一者作病若復有人作如是言我於本心作種種行欲求圓覺彼圓覺性非作得故説名為病初句標名若復下辨相言者意言也彼圓覺下指體以破後句結明下三節同二任病二者任病若復有人作如是言我等今者不斷生死不求涅槃涅槃生死無起滅念任彼一切隨諸法性欲求圓覺彼圓覺性非任有故説名為病意云生死是空何更所斷涅槃本寂何假修求不厭不欣無起滅念又謂妄從他妄真任他真各稱其心何必改作前則驅馳覓佛此乃故縱身心設令善惡不拘即名無記之性行人至此溺水沉舟宜自驚懷勿霑斯病三止病三者止病若復有人作如是言我今自心永息諸念得一切性寂然平等欲求圓覺彼圓覺性非止合故説名為病止息世緣厭喧求靜者不能以性奪修並屬偏邪若行或得諸法無性之性非即覺性非止合故者前云於諸妄心亦不息滅四滅病四者滅病若復有人作如是言我今永斷一切煩惱身心畢竟空無所有何況根塵虗妄境界一切永寂欲求圓覺彼圓覺性非寂相故説名為病夫覺體靈明不唯寂滅今滅惑住寂豈得相應是以作則三學六度名種種行任則生死涅槃本來空寂而無起滅止則息念亡懷滅則斷惑歸正豈為是病才執此念欲求圓覺故皆為病作如是言欲求圓覺二句正是病之體也三結示正邪離四病者則知清淨作是觀者名為正觀若他觀者名為邪觀將前四行自驗其心隨落一門則知是病故言離者則知清淨然上四門皆是勸讚流通之説況前三觀具有斯文今為病論有其二意一者四中皆無觀慧二者但以率心偏住一行若能四皆通達不滯一門即此四中並皆入道故云但除其病不除其法病除法在即正觀也何四病之有哉三答修行善男子末世衆生欲修行者應當盡命供養善友事善知識彼善知識欲來親近應斷憍慢若復遠離應斷嗔恨現逆順境猶如虗空了知身心畢竟平等與諸衆生同體無異如是修行方入圓覺夫善知識度人作種種方便師徒心契法義方傳俯就物機相親相近愚者無智憍慢便生若復遠離應斷嗔恨初心修行須求依止身心平等彼我一如妙圓覺行由所進矣四答除病二初指病源善男子末世衆生不得成道由有無始自他憎愛一切種子故未解脫故知諸病秪由憎愛見自見他故不能久侍師宗但自生嗔憎愛隨有須斷種子則諸病自除二示除法若復有人觀彼怨家如己父母心無有二即除諸病於諸法中自他憎愛亦復如是怨親平等故心無二心無二故即除增愛自他依正真妄諸法若圓觀者一切平等則諸法上憎愛皆盡亦復如是五答發心善男子末世衆生欲求圓覺應當發心作如是言盡於虗空一切衆生我皆令入究竟圓覺於圓覺中無取覺者除彼我人一切諸相如是發心不墮邪見彌勒佛言廣大第一常其心不顛倒者盡於虗空一切衆生廣大心也四生九類我皆令入究竟圓覺第一心也入無餘涅槃於圓覺中無取覺者常心也實無衆生得滅度者除彼我人一切諸相不顛倒心也若有我人等相即非菩薩諸佛因地皆發此心依此願修方成正覺二偈頌二初標舉爾時世尊欲重宣此義而説偈言二正頌缺頌除病文初頌求師普覺汝當知末世諸衆生欲求善知識應當求正見心遠二乘者二頌依法法中除四病謂作止任滅三頌修行親近無憍慢遠離無嗔恨見種種境界心當生希有還如佛出世不犯非律儀戒根永清淨如佛出世長無偈有不犯非律儀戒根永清淨乃追頌求師中不令衆生入不律儀之文今於事師起行中頌者經意互顯故四頌發心度一切衆生究竟入圓覺無彼我人相當依正智慧便得超邪見證覺般涅槃圓覺章顯示方軌二初請問三初進問威儀於是圓覺菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句二初慶前大悲世尊為我等輩廣説淨覺種種方便令末世衆生有大增益二請後世尊我等今者已得開悟若佛滅後末世衆生未得悟者云何安居修此圓覺清淨境界此圓覺中三種淨觀以何為首唯願大悲為諸大衆及末世衆生施大饒益雖問滅後亦兼佛世故下答云若佛現在當正思惟安居者安置淨居即道場中加行也以何為首者問觀首之方便也三三展虔誠作是語已五體投地如是三請終而復始二佛答三初讚許爾時世尊告圓覺菩薩言善哉善哉善男子汝等乃能問於如來如是方便以大饒益施諸衆生汝今諦聽當為汝説二受旨時圓覺菩薩奉教歡喜及諸大衆默然而聽三正答二初長行二初安居期限二初指前善男子一切衆生若佛住世若佛滅後若法末時有諸衆生具大乘性信佛祕密大圓覺心欲修行者若在伽藍安處徒衆有緣事故隨分思察如我已説滅後兼正像性謂種性即了因也伽藍翻衆園法會處也圓機菩薩不滯空間種種施為作諸利益廣度羣品修學法事隨其間暇分中則便思察三觀故云隨分思察二正説四初要制三期若復無有他事因緣即建道場當立期限若立長期百二十日中期百日下期八十日安置淨居菩薩逢益即為遇緣且赴勝利道場克志加功以期聖果則三期皆是自行為簡利他故名他事定三期者過則情生疲厭少則功行未圓故以量克三期亦無別義然約三根配之有其二義一約障盡難易配長期下根中期中根下期上根安置淨期身心潔白事理稱可內外清淨對病設藥斯之謂歟二道場修法若佛現在當正思惟若佛滅後施設形像心存目想生正憶念還同如來常住之日懸諸幡華經三七日稽首十方諸佛名號求哀懺悔遇善境界得心輕安過三七日一向攝念佛若在世無勞設像佛去世時設立形像託以存想如佛在日須達相非相是心是佛方得名為正憶持念莊嚴供具懸幡與華三七等者三期攝念夙障損除善根增長住於正念修攝其心對佛陳詞求哀懺悔初教令依文二初標意若經夏首三月安居當為清淨菩薩止住心離聲聞不假徒衆遇善境界者感應也即與信相應名善境界身心調暢輕利安和神清氣爽若修止者住於靜處端坐正念修攝其心當知唯心無外境界必定毗尼經云持聲聞戒破菩薩戒持菩薩戒破聲聞戒故不假徒衆二作法律制安居二至安居日即於佛前作如是言我比丘比丘尼優婆塞優婆夷某甲踞菩薩乘修寂滅行同入清淨實相住持以大圓覺為我伽藍身心安居平等性智涅槃自性無繫屬故今我敬請不依聲聞當與十方如來及大菩薩三月安居為修菩薩無上妙覺大因緣故不繫徒衆比丘梵語此含三義一怖魔二乞士三淨戒謂比丘尼尼女也優婆塞此云近事男優婆夷此云近事女謂親近三寶而承事故踞菩薩乘簡羊鹿車修寂滅行簡四諦行同入實相簡事相住持以大圓覺為我伽藍是會衆之處故圓覺則萬德之所依以八識海澄清流注體遍十方故名大圓鏡智身心安居者身即五識依色根得名心所緣故心即意識以五識取塵意識分別熏動心海波浪從生今六無分別前五不妄緣即二識永寂故名安居身安故即成所作智心安故即妙觀察智平等性智者此以惑八大相應而起妄計賴耶為自內我於平等理中起不平等見今既所緣性寂能緣亦如如性皆同故平等矣三休期善男子此名菩薩示現安居過三七日隨往無礙道場三期已滿小乘夏限未終以本非小權設方便隨往無礙四誡勿妄取善男子若彼末世修行衆生求菩薩道入三期者非彼所聞一切境界終不可取三期所修不出三觀彼所聞者前明內發寂靜輕安大悲初三觀方便二初列示二初觀至靜二初正釋善男子若諸衆生修奢摩他先取至靜不起思念靜極便覺如是初靜從於一身至一世界覺亦如是善男子若覺遍滿一世界者一世界中有一衆生起一念者皆悉能知百千世界亦復如是奢摩他至靜超動靜二相圓覺顯現亦復如是列于靜也先靜即是體是定次覺即是慧是用初觀成不見自身之相名一身以身靜故當體是覺名一身覺世界亦然今知衆生念者世界既全成覺衆生全在覺中故所起念無不了達如大圓鏡隨機應現亦復然也二誡妄非彼所聞一切境界終不可取由靜心力覺身心空生滅無據涅槃究竟矣二三摩憶持二初正釋善男子若諸衆生修三摩鉢提先當憶想十方如來十方世一切菩薩依種種門漸次修行勤苦三昧廣發大願自熏成種憶想有二意一乞垂加被二欲效修行三摩鉢提從憶想入發四弘誓自熏成種故以云如幻三摩提如苗漸增長二誡妄非彼所聞一切境界終不可取此觀如幻尚不可著況外境界有何取向哉三禪那數息二初正釋善男子若諸衆生修於禪那先取數門心中了知生住滅念分劑頭數如是周遍四威儀中分別念數無不了知漸次增進乃至得知百千世界一滴之雨猶如目覩所受用物修禪那者從數息門入心中下功用也此有二意一者先用數息觀門對治諸覺直至妙觀然修有六一數二息三止四觀五還六靜次第隨便了知生住異滅等相經無異字順文句也義必合有何也十信覺滅相三賢覺異相十地覺住相位滿覺生相故云動念具息心無初相言初相者即無念無念者了知生住異滅乃至皆無自性本來平等同一覺故正當雙遮之妙觀也二誡妄非彼所聞一切境界終不可取滅幻者遮假豈不遮空既雙遮入中一即具三彌為可信矣三總結是名三觀初首方便前問三種淨觀以何為首故具答已結云是名等也即知前段三觀論雖具釋相趣入方便是此所期方便有二應以上文攝念之前禮懺為遠方便以今三觀初首為近方便二利鈍修習二初利根遍修若諸衆生遍修三種勤行精進即名如來出現于世如來本所示現度生勸物修習今三觀既備則萬行已圓故就此人本覺離念名佛出世二鈍根隨學若後末世鈍根衆生心欲求道不得成就由昔業障當勤懺悔常起希望先斷憎愛嫉妬諂曲求勝上心三種淨觀隨學一事此觀不得復習彼觀心不放捨漸次求證根鈍障重故加懺悔發願而隨學之若夙世無有善根惟願諸佛加被我等二偈頌二初標舉爾時世尊欲重宣此義而説偈言二正頌六初頌三期圓覺汝當知一切諸衆生欲求無上道先當結三期二頌修法懺悔無始業經於三七日然後正思惟此下缺頌遇夏安期三頌誡妄非彼所聞境畢竟不可取四頌方便奢摩他至靜三摩正憶持禪那明數門是名三淨觀五頌遍修若能勤修習是名佛出世六頌隨學鈍根未成者常當勤心懺無始一切罪諸障若消滅佛境便現前大科法義也周欲使廣益他方遠霑末世流傳通泰展轉無窮賢善首請問三初進問威儀於是賢善首菩薩在大衆中即從座起頂禮佛足右繞三匝長跪叉手而白佛言二正陳詞句二初慶前大悲世尊廣為我等及末世衆生開悟如是不思議事近慶道場遠該一部二正請世尊此大乘教名字何等云何奉持衆生修習得何功德云何使我護持經人流布此教至於何地流布此教至於何地者若人於此經教供養書寫受持讀誦解説思修如是分布流傳此教似問至何方所考後答文意在奉持三三展虔誠作是語已五體投地如是三請終而復始二如來垂答三初讚許爾時世尊告賢善首菩薩言善哉善哉善男子汝等乃能為諸菩薩及末世衆生問於如來如是經教功德名字汝今諦聽當為汝説所問略提其二二受旨時賢善首菩薩奉教歡喜及諸大衆默然而聽三正答二初總歎善男子是經百千萬億恆河沙諸佛所説三世如來之所守護十方菩薩之所歸依十二部經清淨眼目此有四義前三約人歎謂諸佛説如來守護菩薩歸依而約法歎經之眼目者以窮推迷本照徹覺源理貫羣經義無不盡于此若解諸教煥然若不了之焉知正道十二部經者長行重頌并受記孤起無問而自説因緣譬喻及本事本生方廣未曾有論議俱成十二部名廣如大論三十七二別答五初答名字奉持是經名大方廣圓覺陀羅尼亦名修多羅了義亦名祕密王三昧亦名如來決定境界亦名如來藏自性差別汝當奉持是經五名唯教行理第二約教第三顯行餘皆名理前二如上總題并文殊章已釋祕密中道三昧統攝萬行故名為王決定境界唯佛極證如來藏自性本具諸法故云差別無差之差也佛敕斯旨汝當奉持二答至於何地善男子是經唯顯如來境界唯佛如來能盡宣説若諸菩薩及末世衆生依此修行漸次增進至於佛地顯示如來境界者蓋進道最初要信自心即佛惟佛即心曠大劫來本來成就更不再成前輩達士皆於一念未萌一音未吐已前兩肩荷負直前一往故云能盡宣説若菩薩衆生修行漸次必須正信決定了悟至於佛地是以心非妙悟而莫圓妙悟非情盡而不了情非決定而莫忘決定非正信而不立故前後互顯總答圓覺了義三答得何功德二初舉教攝機善男子是經名為頓教大乘頓機衆生從此開悟亦攝漸修一切羣品譬如大海不讓小流乃至蚊虻及阿修羅飲其水者皆得充滿漸修者教既是頓乃解圓而行漸也如二十五輪最後圓修即頓餘皆屬漸不讓小流者如百川會海咸失本名喻教之獨圓不兼偏小蚊虻故海不讓水積小成大也二較量顯勝三初舉施寶聞名善男子假使有人純以七寶積滿三千大千世界以用布施不如有人聞此經名及一句義世珍盈滿皆是有漏之資妙法無窮必證菩提之果三千世界者小千中千大千也二約證小較宣説善男子假使有人教百恆河沙衆生得阿羅漢果不如有人宣説此經分別半偈圓覺法門究竟了義小大權實此較天殊偈有四句二句文句義句若約文句則兩句為半偈若約義句即一切法本來空寂是為半偈顯空不空方為全偈三明聞信宿因善男子若復有人聞此經名信心不惑當知是人非於一佛二佛種諸福慧如是乃至盡恆河沙一切佛所種諸善根聞此經教上但聞名今信不惑能信一切法即大圓覺豈小緣哉若非無量劫深種善根聞此教法永不退轉直至菩提四答護持經人汝善男子當護末世是修行者無令惡魔及諸外道惱其身心令生退屈前文請問云何護持經人流布等今答護持末世修行人者使其捨惡以從善忘善以合道捨邪以歸正忘正以會心未越念而三有空不勤塵而魔界盡復歸本際洞徹根源方便之權無不了義至於善惡邪正會歸一體觀根設教普利羣機信手拈來無非妙用隨衆生願報佛祖恩手眼通身一機不露熾然作用一物不為撤手去來了無拘束是謂護持流布圓覺修多羅了義經之本旨也重頌此義而宣偈曰是經諸佛説如來守護持十二部眼目名為大方廣圓覺陀羅尼顯如來境界歸依增進者必至於佛地如百川海納飲者皆充滿假使積七寶滿大千布施不如聞此經若化河沙衆皆得阿羅漢不如聞半偈汝等末世衆護持盡宣説一圓一切圓一覺一切覺五答大神稟命三初金剛衆爾時會中有火首金剛摧碎金剛尼藍婆金剛等八萬金剛并其眷屬即從座起頂禮佛足右繞三匝而白佛言世尊若後末世一切衆生有能持此決定大乘我當守護如護眼目乃至道場所修行處我等金剛自領徒衆晨夕守護令不退轉其家乃至永無災障疫病消滅財寶豐足常不乏少火首者頭有火𦦨故尼藍婆未祥金剛者執持杵故露肩神初發心時常起大願常為力士護修行人其家者在家衆也凡發道心若有障難乃至多種災病今由神護一切皆除財寶豐足備道資緣常不乏少不乏少故進趣妙門不退屈矣二天王衆爾時大梵王二十八天王并須彌山王護國天王等即從座起頂禮佛足右繞三匝而白佛言世尊我亦守護是持經者常令安隱心不退轉大梵王者即指初禪王娑婆世界主二十八天王總指三界須彌山王名帝釋護國天王等別顯四王所以標三種由梵與釋諸佛轉法輪時皆為主護世持國使災害不生故總列外而更明三鬼王衆等爾時有大力鬼王名吉槃茶與十萬鬼王即從座起頂禮佛足右繞三匝而白佛言世尊我亦守護是持經人朝夕侍衛令不退屈其人所居一由旬內若有鬼神侵其境界我當使其碎如微塵吉槃茶者亦云鳩槃茶食人精氣其疾如風變化稍多住於林野管諸鬼衆故號為王來至道場而為上首眷屬十萬一一若斯依附深山或居巖穴其形可畏通變極多不屬天人住居鬼趣不退屈者五總結佛説此經已一切菩薩天龍鬼神八部眷屬及諸天王梵王等一切大衆聞佛所説皆大歡喜信受奉行結會既云八部驗上同聞不獨菩薩又天龍等必內證法性外現此形亦是戒緩乘急皆大歡喜信受者結聞有三義奉行一清淨不染世出世法故二所説清淨以如實體故三得果清淨即説益也令末世等一切衆生皆悉得聞因行之中無不成佛刻圓覺經要解後序古德云所起之因既的所期之果必親所操之志惟真則其所詣之地不期實而實矣昔世尊諦觀三界諸微塵剎衆生無一剎那而不受生無一剎那而不變滅浩浩乎不可以數計也而況妄情起滅剎那不住生死之理由是如來哀憫末世於大寂定中隨十二大士問答之本懷為轉法輪故立題名曰大方廣圓覺修多羅了義經夫圓非色像不可得而見有見非圓覺非境緣不可得而及可及非覺圓乎不可見而見之覺乎不可及而及矣其不可見之圓廓爾無像不可及之覺洞然絶蹤無像之圓體之莫非神悟罔及之覺混之必欲心開然謂雖妄之謂圓圓之所詣之謂覺謂妄者何以迷自心故見聞覺知皆妄也謂真者何以悟自心故明暗色空皆真也真無定體悟之即圓妄絶正形迷之則著全波即水了之妄外無真全水即波畢竟真中絶妄是以羣波共水衆器同金理體元齊事相非一似與本來具足少林直指之道覿體相反不然爾徒見其言下知歸機芥領止之易而不知其銷鎔金礦之難歷於夙昔之因以致今生之易苟不知難而欲知易猶認礦為金無以異也當知妄依真而起妄真由妄而顯真真非妄而真不自居妄非真而妄無所倚妄因不立真理何存則如來所説圓覺者即非圓覺是名圓覺是以圓不立而圓存覺無形而覺遍故云大圓滿覺寂正述刻圓覺經要解後序終
