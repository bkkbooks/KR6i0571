body:
  text: 大方廣圓覺修多羅了義經要解序昔婆伽婆入于神通大光明藏三昧正受時上至諸佛菩薩下及十二類生乃至有無情等同時俱入自昔至今不起于座就中無主無伴離聖離凡身心混融性相平等良由十二大士瞥興問端如來據大圓覺縱其所問廣說修證爾時文殊菩薩首問如來本起因地法行及為菩薩遠離諸病世尊為答皆依圓照清淨覺相永斷無明方成佛道且使末世不墮邪見者一經之要不出此三是故大義所以先之也普賢菩薩致問若彼眾生知如幻者身心亦幻云何以幻還修於幻等如來為答應當遠離一切幻化虗妄境界幻雖以離其未離者復如何修而得開悟故普眼菩薩請問菩薩修行漸次世尊為答先依玅奢摩他堅持禁戒安處徒眾宴坐靜室徧觀四大及與身心皆同幻化便能顯發無方清淨依而決了則幻滅覺圓了知眾生本來成佛當時雖得開悟後世未免疑情故金剛藏菩薩請問承上本來成佛示之何故後有一切無明若諸無明眾生本有何因緣故如來開示本來成佛扣此三疑於是請決如來以示先斷輪迴根本如是分別多諸巧見非為正問故次彌勒菩薩復問所以當斷輪迴之說佛乃示之欲脫生死免諸輪迴及除愛渴由本貪欲顯出五性差別不等故清淨慧菩薩復疑請問圓滿覺性一切眾生及諸菩薩如來所證所得云何差別世尊答之未能除滅一切幻化於滅未滅妄功用中便顯差別若得如來寂滅隨順實無寂滅及寂滅者威德自在菩薩請問一切方便漸次總有幾種世尊答之玅奢摩他三摩波提寂滅禪那如是進修然而觀門雖三其修不定故次辯音菩薩致問於圓覺門有幾修者如來為答二十五輪隨機修入必得成就或修而未入則染污之所蔽也以故淨諸業障菩薩請問躡上本性清淨因何染污使之不入佛答認四顛倒為實我體由此便生憎愛二境汝等但當精勤降伏煩惱起大勇猛未得令得未斷令斷佛說是人漸次成就求善知識不墮邪見故普覺菩薩致問求何等人依何等法行何等行除去何病云何發心不墮邪見世尊將收玄唱開示作止任滅均名是病即病一言取舍俱奪苟知縱而不知奪混圓覺於問答之場或知奪而不知縱墮圓覺於泯默之地當知縱亦藥也奪亦藥也即其縱之之藥治三毒四倒之正病以其奪之之藥治作止任滅之助病當知作止任滅之藥病非如來洞鑑則孰能指也圓覺菩薩猶恐末世眾生根鈍障重必須克念加其䇿修重復請問如來為說三期進修求哀懺悔復以三觀加行隨學一事勤修習之只佛事已週行解之要至此備矣於是賢善首菩薩欲使廣益他方遠霑來世復於最後四問為資末世普皆饒益因行之中無不成佛行解問明至此畢矣如上世尊菩薩問答之本懷為新發意及末世等破其妄執使其了解別無他說于經文中或翻譯之失或傳寫之訛或義解不通當以理遣不必滯於微瑕而乖大義蓋悲願弘深痛心之切也大明萬曆丁巳佛成道日武林釋寂正書
